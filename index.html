<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>RXLOG</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0A0A0A;
  --surface: #141414;
  --surface-2: #1E1E1E;
  --surface-3: #282828;
  --accent: #CCFF00;
  --accent-dim: #99cc00;
  --accent-bg: rgba(204, 255, 0, 0.08);
  --accent-bg-2: rgba(204, 255, 0, 0.15);
  --text: #FFFFFF;
  --text-secondary: #999999;
  --text-muted: #555555;
  --danger: #FF4444;
  --danger-bg: rgba(255, 68, 68, 0.1);
  --success: #00CC66;
  --radius: 14px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}

body {
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ── NAV ── */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--surface-3);
  padding: 6px 0 calc(6px + var(--safe-bottom));
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.tab-bar button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 8px 0 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: color 0.2s;
}

.tab-bar button.active { color: var(--accent); }
.tab-bar button svg { width: 22px; height: 22px; }

/* ── VIEWS ── */
.view {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: none;
  -webkit-overflow-scrolling: touch;
}

.view.active { display: flex; flex-direction: column; }

.view-header {
  padding: 16px 20px 12px;
  flex-shrink: 0;
}

.view-header h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.view-header h1 span { color: var(--accent); }

.view-content {
  flex: 1;
  padding: 0 16px 24px;
  overflow-y: auto;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}

.card:active { border-color: var(--surface-3); }

.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}

.card-meta {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--surface-2);
  color: var(--text-secondary);
}

.meta-tag.accent {
  background: var(--accent-bg);
  color: var(--accent);
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  letter-spacing: 0.3px;
}

.btn-primary {
  background: var(--accent);
  color: #0A0A0A;
}

.btn-primary:active { background: var(--accent-dim); }

.btn-secondary {
  background: var(--surface-2);
  color: var(--text);
}

.btn-secondary:active { background: var(--surface-3); }

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
}

.btn-ghost {
  background: none;
  color: var(--accent);
  padding: 10px;
}

.btn-sm {
  padding: 10px 16px;
  font-size: 13px;
  width: auto;
}

/* ── FORMS ── */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--accent); }

.form-input::placeholder { color: var(--text-muted); }

.form-row {
  display: flex;
  gap: 10px;
}

.form-row > * { flex: 1; }

/* ── MODE SELECTOR ── */
.mode-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  background: var(--surface-2);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.mode-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}

/* ── EXERCISE LIST (builder) ── */
.exercise-item {
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.exercise-item .drag-handle {
  color: var(--text-muted);
  font-size: 18px;
  cursor: grab;
  flex-shrink: 0;
}

.exercise-item .exercise-info { flex: 1; }

.exercise-item .exercise-name {
  font-size: 14px;
  font-weight: 600;
}

.exercise-item .exercise-detail {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.exercise-item .remove-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.exercise-item .remove-btn:active { color: var(--danger); }

/* ── ACTIVE WORKOUT ── */
.workout-active-header {
  text-align: center;
  padding: 20px 16px 8px;
}

.workout-active-header .workout-name {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
}

.workout-active-header .workout-elapsed {
  font-size: 14px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.timer-display {
  text-align: center;
  padding: 24px 16px;
}

.timer-display .timer-value {
  font-size: 72px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -2px;
  color: var(--accent);
  line-height: 1;
}

.timer-display .timer-label {
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 8px;
}

.timer-controls {
  display: flex;
  gap: 12px;
  padding: 0 16px;
  margin-bottom: 16px;
}

.timer-controls .btn { flex: 1; }

.current-exercise {
  text-align: center;
  padding: 16px;
}

.current-exercise .exercise-label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.current-exercise .exercise-title {
  font-size: 24px;
  font-weight: 800;
  margin: 6px 0;
}

.current-exercise .exercise-prescription {
  font-size: 15px;
  color: var(--text-secondary);
}

.set-tracker {
  padding: 0 16px;
}

.set-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
}

.set-row.active {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
}

.set-row.completed {
  opacity: 0.5;
}

.set-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  width: 32px;
}

.set-row.active .set-number { color: var(--accent); }

.set-input {
  width: 64px;
  padding: 8px;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  text-align: center;
  font-family: inherit;
  font-weight: 600;
  outline: none;
}

.set-input:focus { border-color: var(--accent); }

.set-input-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.set-field {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.set-check {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--surface-3);
  background: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: auto;
  flex-shrink: 0;
  transition: all 0.2s;
}

.set-check.done {
  background: var(--accent);
  border-color: var(--accent);
  color: #0A0A0A;
}

/* ── HISTORY ── */
.history-date {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  padding: 16px 4px 8px;
}

.history-card {
  cursor: pointer;
}

.history-stats {
  display: flex;
  gap: 16px;
  margin-top: 10px;
}

.history-stat .stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}

.history-stat .stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  animation: slideUp 0.25s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal h2 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 20px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 32px;
  color: var(--text-secondary);
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 24px;
}

/* ── TIMER EDIT INLINE ── */
.timer-edit-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}

.timer-edit-input {
  width: 56px;
  padding: 6px;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-radius: 8px;
  color: var(--accent);
  font-size: 18px;
  text-align: center;
  font-weight: 700;
  font-family: inherit;
  outline: none;
}

.timer-edit-input:focus { border-color: var(--accent); }

.timer-edit-label {
  font-size: 12px;
  color: var(--text-muted);
}

/* ── ROUND COUNTER (AMRAP) ── */
.round-counter {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 16px;
}

.round-counter .round-value {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  min-width: 60px;
  text-align: center;
}

.round-counter button {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--surface-3);
  background: var(--surface-2);
  color: var(--text);
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.round-counter button:active {
  background: var(--accent-bg);
  border-color: var(--accent);
}

/* ── BLOCK DIVIDER ── */
.block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 8px;
}

.block-header .block-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  white-space: nowrap;
}

.block-header .block-line {
  flex: 1;
  height: 1px;
  background: var(--surface-3);
}

/* scrollbar */
::-webkit-scrollbar { width: 0; }

/* number input arrows */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type="number"] { -moz-appearance: textfield; }

.fab {
  position: fixed;
  bottom: calc(72px + var(--safe-bottom));
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #0A0A0A;
  border: none;
  font-size: 28px;
  font-weight: 300;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(204, 255, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 90;
  transition: transform 0.15s;
}

.fab:active { transform: scale(0.92); }
.fab.hidden { display: none; }

/* ── EMOM INTERVAL INDICATOR ── */
.emom-progress {
  display: flex;
  gap: 4px;
  padding: 0 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.emom-dot {
  height: 6px;
  flex: 1;
  min-width: 8px;
  border-radius: 3px;
  background: var(--surface-3);
  transition: background 0.3s;
}

.emom-dot.done { background: var(--accent); }
.emom-dot.active { background: var(--accent); animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── WORKOUT COMPLETE ── */
.workout-summary {
  text-align: center;
  padding: 40px 24px;
}

.workout-summary .check-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--accent);
  color: #0A0A0A;
  font-size: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}

.workout-summary h2 {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 4px;
}

.summary-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 24px 0;
}

.summary-stat .s-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}

.summary-stat .s-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<!-- ════════════ WORKOUTS VIEW ════════════ -->
<div id="view-workouts" class="view active">
  <div class="view-header">
    <h1>RX<span>LOG</span></h1>
  </div>
  <div class="view-content" id="workouts-list"></div>
</div>

<!-- ════════════ TRAIN VIEW ════════════ -->
<div id="view-train" class="view">
  <div id="train-content"></div>
</div>

<!-- ════════════ HISTORY VIEW ════════════ -->
<div id="view-history" class="view">
  <div class="view-header">
    <h1>History</h1>
  </div>
  <div class="view-content" id="history-list"></div>
</div>

<!-- ════════════ EXPORT VIEW ════════════ -->
<div id="view-export" class="view">
  <div class="view-header">
    <h1>Export</h1>
  </div>
  <div class="view-content">
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Download Your Data</div>
      <div class="card-subtitle" style="margin-bottom:16px">Export all workout history for use in spreadsheets or other tools.</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-primary btn-sm" onclick="exportCSV()">Export CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="exportJSON()">Export JSON</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Workout Templates</div>
      <div class="card-subtitle" style="margin-bottom:16px">Export/import your saved workout templates.</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-secondary btn-sm" onclick="exportTemplates()">Export Templates (JSON)</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-file').click()">Import Templates</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importTemplates(event)">
      </div>
    </div>
  </div>
</div>

<!-- ════════════ FAB ════════════ -->
<button class="fab" id="fab" onclick="openNewWorkout()">+</button>

<!-- ════════════ TAB BAR ════════════ -->
<nav class="tab-bar">
  <button class="active" onclick="switchTab('workouts')" data-tab="workouts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    Workouts
  </button>
  <button onclick="switchTab('train')" data-tab="train">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
    Train
  </button>
  <button onclick="switchTab('history')" data-tab="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><polyline points="7 14 11 10 15 13 21 7"/></svg>
    History
  </button>
  <button onclick="switchTab('export')" data-tab="export">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
</nav>

<!-- ════════════ MODAL: NEW/EDIT WORKOUT ════════════ -->
<div class="modal-overlay" id="modal-workout">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-workout-title">New Workout</h2>

    <div class="form-group">
      <label class="form-label">Workout Name</label>
      <input class="form-input" id="workout-name" placeholder="e.g. Upper Body A">
    </div>

    <div id="blocks-container"></div>

    <button class="btn btn-secondary" onclick="addBlock()" style="margin-bottom:16px">+ Add Block</button>

    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="saveWorkout()" style="flex:2">Save Workout</button>
      <button class="btn btn-danger btn-sm" onclick="closeModal('modal-workout')" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<!-- ════════════ MODAL: ADD EXERCISE ════════════ -->
<div class="modal-overlay" id="modal-exercise">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add Exercise</h2>

    <div class="form-group">
      <label class="form-label">Exercise Name</label>
      <input class="form-input" id="exercise-name" placeholder="e.g. Back Squat">
    </div>

    <div id="exercise-fields-strength">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Sets</label>
          <input class="form-input" id="exercise-sets" type="number" placeholder="5" inputmode="numeric">
        </div>
        <div class="form-group">
          <label class="form-label">Reps</label>
          <input class="form-input" id="exercise-reps" type="number" placeholder="5" inputmode="numeric">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input class="form-input" id="exercise-weight" type="number" placeholder="80" inputmode="decimal">
        </div>
        <div class="form-group">
          <label class="form-label">Rest (sec)</label>
          <input class="form-input" id="exercise-rest" type="number" placeholder="90" inputmode="numeric">
        </div>
      </div>
    </div>

    <div id="exercise-fields-emom" style="display:none">
      <div class="form-group">
        <label class="form-label">Reps per interval</label>
        <input class="form-input" id="exercise-emom-reps" type="number" placeholder="10" inputmode="numeric">
      </div>
    </div>

    <div id="exercise-fields-amrap" style="display:none">
      <div class="form-group">
        <label class="form-label">Reps per round</label>
        <input class="form-input" id="exercise-amrap-reps" type="number" placeholder="10" inputmode="numeric">
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveExercise()" style="flex:2">Add</button>
      <button class="btn btn-danger btn-sm" onclick="closeModal('modal-exercise')" style="flex:1">Cancel</button>
    </div>
  </div>
</div>

<!-- ════════════ MODAL: HISTORY DETAIL ════════════ -->
<div class="modal-overlay" id="modal-history-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="history-detail-content"></div>
    <button class="btn btn-secondary" onclick="closeModal('modal-history-detail')" style="margin-top:16px">Close</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════
const DB = {
  get(key, fallback) {
    try { const v = localStorage.getItem('rxlog_' + key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, val) { localStorage.setItem('rxlog_' + key, JSON.stringify(val)); },
};

let workouts = DB.get('workouts', []);
let history = DB.get('history', []);
let activeSession = null;
let timerInterval = null;
let sessionStartTime = null;
let editingWorkoutId = null;
let currentBlockIndex = null;

// ═══════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');

  const fab = document.getElementById('fab');
  fab.className = 'fab' + (name !== 'workouts' ? ' hidden' : '');

  if (name === 'history') renderHistory();
  if (name === 'workouts') renderWorkouts();
}

// ═══════════════════════════════════════
// WORKOUTS LIST
// ═══════════════════════════════════════
function renderWorkouts() {
  const el = document.getElementById('workouts-list');
  if (workouts.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#9775;</div>
        <h3>No Workouts Yet</h3>
        <p>Create your first workout template to get started.</p>
        <button class="btn btn-primary btn-sm" onclick="openNewWorkout()" style="width:auto;margin:0 auto">Create Workout</button>
      </div>`;
    return;
  }

  el.innerHTML = workouts.map(w => {
    const totalExercises = w.blocks.reduce((sum, b) => sum + b.exercises.length, 0);
    const modes = [...new Set(w.blocks.map(b => b.mode))];
    const hasSuperset = w.blocks.some(b => b.superset);
    return `
      <div class="card" onclick="startWorkout('${w.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div class="card-title">${esc(w.name)}</div>
            <div class="card-subtitle">${totalExercises} exercise${totalExercises !== 1 ? 's' : ''} · ${w.blocks.length} block${w.blocks.length !== 1 ? 's' : ''}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-ghost btn-sm" onclick="event.stopPropagation();editWorkout('${w.id}')" style="font-size:16px;padding:6px">&#9998;</button>
            <button class="btn-ghost btn-sm" onclick="event.stopPropagation();deleteWorkout('${w.id}')" style="font-size:16px;padding:6px;color:var(--danger)">&#10005;</button>
          </div>
        </div>
        <div class="card-meta">
          ${modes.map(m => `<span class="meta-tag accent">${m}</span>`).join('')}
          ${hasSuperset ? '<span class="meta-tag accent">superset</span>' : ''}
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// WORKOUT BUILDER
// ═══════════════════════════════════════
let builderBlocks = [];

function openNewWorkout() {
  editingWorkoutId = null;
  document.getElementById('modal-workout-title').textContent = 'New Workout';
  document.getElementById('workout-name').value = '';
  builderBlocks = [];
  addBlock();
  openModal('modal-workout');
}

function editWorkout(id) {
  const w = workouts.find(x => x.id === id);
  if (!w) return;
  editingWorkoutId = id;
  document.getElementById('modal-workout-title').textContent = 'Edit Workout';
  document.getElementById('workout-name').value = w.name;
  builderBlocks = JSON.parse(JSON.stringify(w.blocks));
  renderBlocks();
  openModal('modal-workout');
}

function addBlock() {
  builderBlocks.push({ mode: 'strength', exercises: [], duration: 10, interval: 60, superset: false });
  renderBlocks();
}

function renderBlocks() {
  const container = document.getElementById('blocks-container');
  container.innerHTML = builderBlocks.map((block, bi) => {
    let extraFields = '';

    if (block.mode === 'strength' && block.exercises.length >= 2) {
      extraFields += `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:var(--surface-2);border-radius:var(--radius-sm)">
          <label style="flex:1;font-size:13px;font-weight:600;color:${block.superset ? 'var(--accent)' : 'var(--text-secondary)'}">Superset</label>
          <button onclick="toggleSuperset(${bi})" style="width:48px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;background:${block.superset ? 'var(--accent)' : 'var(--surface-3)'};transition:background 0.2s">
            <span style="position:absolute;top:2px;${block.superset ? 'right:2px' : 'left:2px'};width:24px;height:24px;border-radius:50%;background:${block.superset ? '#0A0A0A' : 'var(--text-muted)'};transition:all 0.2s"></span>
          </button>
        </div>`;
    }

    if (block.mode === 'emom') {
      extraFields += `
        <div class="form-row" style="margin-bottom:12px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Rounds</label>
            <input class="form-input" type="number" value="${block.duration || 10}" inputmode="numeric"
              onchange="builderBlocks[${bi}].duration=+this.value">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Interval (sec)</label>
            <input class="form-input" type="number" value="${block.interval || 60}" inputmode="numeric"
              onchange="builderBlocks[${bi}].interval=+this.value">
          </div>
        </div>`;
    } else if (block.mode === 'amrap') {
      extraFields = `
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">Duration (min)</label>
          <input class="form-input" type="number" value="${block.duration || 10}" inputmode="numeric"
            onchange="builderBlocks[${bi}].duration=+this.value">
        </div>`;
    }

    return `
      <div style="margin-bottom:20px">
        <div class="block-header">
          <span class="block-label">Block ${bi + 1}</span>
          <span class="block-line"></span>
          ${builderBlocks.length > 1 ? `<button class="btn-ghost" style="font-size:14px;padding:4px;color:var(--danger)" onclick="removeBlock(${bi})">Remove</button>` : ''}
        </div>
        <div class="mode-selector">
          <button class="mode-btn ${block.mode === 'strength' ? 'active' : ''}" onclick="setBlockMode(${bi},'strength')">Strength</button>
          <button class="mode-btn ${block.mode === 'emom' ? 'active' : ''}" onclick="setBlockMode(${bi},'emom')">EMOM</button>
          <button class="mode-btn ${block.mode === 'amrap' ? 'active' : ''}" onclick="setBlockMode(${bi},'amrap')">AMRAP</button>
        </div>
        ${extraFields}
        <div id="block-exercises-${bi}">
          ${block.exercises.map((ex, ei) => `
            <div class="exercise-item">
              <span class="drag-handle">⠿</span>
              <div class="exercise-info">
                <div class="exercise-name">${esc(ex.name)}</div>
                <div class="exercise-detail">${exerciseDetail(ex, block.mode)}</div>
              </div>
              <button class="remove-btn" onclick="removeExercise(${bi},${ei})">×</button>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-secondary btn-sm" onclick="openAddExercise(${bi})" style="margin-top:8px">+ Exercise</button>
      </div>`;
  }).join('');
}

function exerciseDetail(ex, mode) {
  if (mode === 'strength') return `${ex.sets || 0}×${ex.reps || 0} @ ${ex.weight || 0}kg · ${ex.rest || 0}s rest`;
  if (mode === 'emom') return `${ex.reps || 0} reps/interval`;
  if (mode === 'amrap') return `${ex.reps || 0} reps/round`;
  return '';
}

function toggleSuperset(bi) {
  builderBlocks[bi].superset = !builderBlocks[bi].superset;
  renderBlocks();
}

function setBlockMode(bi, mode) {
  builderBlocks[bi].mode = mode;
  renderBlocks();
}

function removeBlock(bi) {
  builderBlocks.splice(bi, 1);
  renderBlocks();
}

function removeExercise(bi, ei) {
  builderBlocks[bi].exercises.splice(ei, 1);
  renderBlocks();
}

function openAddExercise(bi) {
  currentBlockIndex = bi;
  const mode = builderBlocks[bi].mode;
  document.getElementById('exercise-name').value = '';
  document.getElementById('exercise-sets').value = '';
  document.getElementById('exercise-reps').value = '';
  document.getElementById('exercise-weight').value = '';
  document.getElementById('exercise-rest').value = '';
  document.getElementById('exercise-emom-reps').value = '';
  document.getElementById('exercise-amrap-reps').value = '';

  document.getElementById('exercise-fields-strength').style.display = mode === 'strength' ? '' : 'none';
  document.getElementById('exercise-fields-emom').style.display = mode === 'emom' ? '' : 'none';
  document.getElementById('exercise-fields-amrap').style.display = mode === 'amrap' ? '' : 'none';

  openModal('modal-exercise');
}

function saveExercise() {
  const name = document.getElementById('exercise-name').value.trim();
  if (!name) return;
  const mode = builderBlocks[currentBlockIndex].mode;
  const ex = { name };

  if (mode === 'strength') {
    ex.sets = +document.getElementById('exercise-sets').value || 3;
    ex.reps = +document.getElementById('exercise-reps').value || 10;
    ex.weight = +document.getElementById('exercise-weight').value || 0;
    ex.rest = +document.getElementById('exercise-rest').value || 60;
  } else if (mode === 'emom') {
    ex.reps = +document.getElementById('exercise-emom-reps').value || 10;
  } else if (mode === 'amrap') {
    ex.reps = +document.getElementById('exercise-amrap-reps').value || 10;
  }

  builderBlocks[currentBlockIndex].exercises.push(ex);
  closeModal('modal-exercise');
  renderBlocks();
}

function saveWorkout() {
  const name = document.getElementById('workout-name').value.trim();
  if (!name) return;
  if (builderBlocks.every(b => b.exercises.length === 0)) return;

  if (editingWorkoutId) {
    const idx = workouts.findIndex(w => w.id === editingWorkoutId);
    if (idx >= 0) {
      workouts[idx].name = name;
      workouts[idx].blocks = builderBlocks;
    }
  } else {
    workouts.push({ id: uid(), name, blocks: builderBlocks });
  }

  DB.set('workouts', workouts);
  closeModal('modal-workout');
  renderWorkouts();
}

function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  workouts = workouts.filter(w => w.id !== id);
  DB.set('workouts', workouts);
  renderWorkouts();
}

// ═══════════════════════════════════════
// ACTIVE TRAINING SESSION
// ═══════════════════════════════════════
function startWorkout(id) {
  const template = workouts.find(w => w.id === id);
  if (!template) return;

  activeSession = {
    templateId: id,
    templateName: template.name,
    startedAt: new Date().toISOString(),
    blocks: JSON.parse(JSON.stringify(template.blocks)),
    currentBlock: 0,
    currentExercise: 0,
    currentSet: 0,
    setLogs: [],
    amrapRounds: 0,
    amrapReps: 0,
    emomCurrentRound: 0,
    supersetRound: 0,
    supersetExIndex: 0,
    timerRunning: false,
    timerSeconds: 0,
    restSeconds: 0,
    isResting: false,
  };

  sessionStartTime = Date.now();
  switchTab('train');
  renderTrainView();
  startSessionTimer();
}

function startSessionTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!activeSession) return;
    updateTimers();
    renderTimerDisplay();
  }, 200);
}

function updateTimers() {
  if (!activeSession || !activeSession.timerRunning) return;
  const block = activeSession.blocks[activeSession.currentBlock];
  if (!block) return;

  if (block.mode === 'strength') {
    if (activeSession.isResting) {
      activeSession.restSeconds -= 0.2;
      if (activeSession.restSeconds <= 0) {
        activeSession.restSeconds = 0;
        activeSession.isResting = false;
        activeSession.timerRunning = false;
        vibrate();
      }
    }
  } else if (block.mode === 'emom') {
    activeSession.timerSeconds -= 0.2;
    if (activeSession.timerSeconds <= 0) {
      activeSession.emomCurrentRound++;
      if (activeSession.emomCurrentRound >= (block.duration || 10)) {
        activeSession.timerRunning = false;
        vibrate();
        nextBlock();
        return;
      }
      activeSession.timerSeconds = block.interval || 60;
      activeSession.currentExercise = activeSession.emomCurrentRound % block.exercises.length;
      vibrate();
      renderTrainView();
    }
  } else if (block.mode === 'amrap') {
    activeSession.timerSeconds -= 0.2;
    if (activeSession.timerSeconds <= 0) {
      activeSession.timerSeconds = 0;
      activeSession.timerRunning = false;
      vibrate();
      nextBlock();
      return;
    }
  }
}

function renderTrainView() {
  const el = document.getElementById('train-content');
  if (!activeSession) {
    el.innerHTML = `
      <div class="empty-state" style="padding-top:100px">
        <div class="empty-icon">&#9201;</div>
        <h3>Ready to Train</h3>
        <p>Select a workout from the Workouts tab to begin.</p>
      </div>`;
    return;
  }

  const block = activeSession.blocks[activeSession.currentBlock];
  if (!block) {
    renderWorkoutComplete();
    return;
  }

  const elapsed = sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : '00:00';

  let content = `
    <div class="workout-active-header">
      <div class="workout-name">${esc(activeSession.templateName)}</div>
      <div class="workout-elapsed">${elapsed} · Block ${activeSession.currentBlock + 1}/${activeSession.blocks.length}</div>
    </div>`;

  if (block.mode === 'strength') {
    content += renderStrengthBlock(block);
  } else if (block.mode === 'emom') {
    content += renderEmomBlock(block);
  } else if (block.mode === 'amrap') {
    content += renderAmrapBlock(block);
  }

  content += `
    <div style="padding:16px;margin-top:auto">
      <div style="display:flex;gap:10px">
        ${activeSession.currentBlock < activeSession.blocks.length - 1 ?
          `<button class="btn btn-secondary" onclick="nextBlock()">Skip Block ▸</button>` : ''}
        <button class="btn btn-danger" onclick="finishWorkout()">End Workout</button>
      </div>
    </div>`;

  el.innerHTML = content;
}

function renderStrengthBlock(block) {
  if (block.superset && block.exercises.length >= 2) {
    return renderSupersetBlock(block);
  }

  const ex = block.exercises[activeSession.currentExercise];
  if (!ex) return '';
  const totalSets = ex.sets || 3;

  let setsHtml = '';
  for (let s = 0; s < totalSets; s++) {
    const log = getSetLog(activeSession.currentBlock, activeSession.currentExercise, s);
    const isActive = s === activeSession.currentSet;
    const isDone = log && log.done;

    setsHtml += `
      <div class="set-row ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}">
        <div class="set-number">S${s + 1}</div>
        <div class="set-field">
          <input class="set-input" type="number" inputmode="decimal" value="${log ? log.weight : ex.weight || ''}"
            onchange="updateSetLog(${activeSession.currentBlock},${activeSession.currentExercise},${s},'weight',+this.value)"
            placeholder="${ex.weight || '—'}">
          <span class="set-input-label">kg</span>
        </div>
        <div class="set-field">
          <input class="set-input" type="number" inputmode="numeric" value="${log ? log.reps : ex.reps || ''}"
            onchange="updateSetLog(${activeSession.currentBlock},${activeSession.currentExercise},${s},'reps',+this.value)"
            placeholder="${ex.reps || '—'}">
          <span class="set-input-label">reps</span>
        </div>
        <button class="set-check ${isDone ? 'done' : ''}" onclick="completeSet(${s})">✓</button>
      </div>`;
  }

  const restDisplay = activeSession.isResting ?
    `<div class="timer-display">
      <div class="timer-value">${Math.ceil(activeSession.restSeconds)}</div>
      <div class="timer-label">Rest</div>
      <div class="timer-edit-row">
        <button class="btn btn-secondary btn-sm" style="width:auto;padding:6px 12px" onclick="adjustRest(-15)">−15s</button>
        <button class="btn btn-secondary btn-sm" style="width:auto;padding:6px 12px" onclick="adjustRest(15)">+15s</button>
        <button class="btn btn-primary btn-sm" style="width:auto;padding:6px 12px" onclick="skipRest()">Skip</button>
      </div>
    </div>` : '';

  const exNav = block.exercises.length > 1 ? `
    <div style="display:flex;gap:8px;padding:0 16px;margin-bottom:12px">
      ${block.exercises.map((e, i) => `
        <button class="mode-btn ${i === activeSession.currentExercise ? 'active' : ''}"
          onclick="switchExercise(${i})" style="font-size:11px;padding:8px 4px">${esc(e.name)}</button>
      `).join('')}
    </div>` : '';

  return `
    ${exNav}
    <div class="current-exercise">
      <div class="exercise-label">Exercise ${activeSession.currentExercise + 1}/${block.exercises.length}</div>
      <div class="exercise-title">${esc(ex.name)}</div>
      <div class="exercise-prescription">${totalSets} × ${ex.reps} @ ${ex.weight || '—'}kg · ${ex.rest || 60}s rest</div>
    </div>
    ${restDisplay}
    <div class="set-tracker">${setsHtml}</div>`;
}

function renderSupersetBlock(block) {
  const bi = activeSession.currentBlock;
  const maxSets = Math.max(...block.exercises.map(e => e.sets || 3));
  const currentRound = activeSession.supersetRound || 0;
  const currentExInRound = activeSession.supersetExIndex || 0;
  const currentEx = block.exercises[currentExInRound];
  const labels = block.exercises.length === 2 ? ['A', 'B'] : block.exercises.map((_, i) => String.fromCharCode(65 + i));

  const restDisplay = activeSession.isResting ?
    `<div class="timer-display">
      <div class="timer-value">${Math.ceil(activeSession.restSeconds)}</div>
      <div class="timer-label">Rest — then Round ${currentRound + 1 + 1}</div>
      <div class="timer-edit-row">
        <button class="btn btn-secondary btn-sm" style="width:auto;padding:6px 12px" onclick="adjustRest(-15)">−15s</button>
        <button class="btn btn-secondary btn-sm" style="width:auto;padding:6px 12px" onclick="adjustRest(15)">+15s</button>
        <button class="btn btn-primary btn-sm" style="width:auto;padding:6px 12px" onclick="skipRest()">Skip</button>
      </div>
    </div>` : '';

  let roundsHtml = '';
  for (let r = 0; r < maxSets; r++) {
    const isCurrentRound = r === currentRound;
    const roundDone = block.exercises.every((ex, ei) => {
      if (r >= (ex.sets || 3)) return true;
      const log = getSetLog(bi, ei, r);
      return log && log.done;
    });

    roundsHtml += `<div class="block-header"><span class="block-label" style="color:${roundDone ? 'var(--text-muted)' : isCurrentRound ? 'var(--accent)' : 'var(--text-secondary)'}">Round ${r + 1}</span><span class="block-line"></span></div>`;

    block.exercises.forEach((ex, ei) => {
      if (r >= (ex.sets || 3)) return;
      const log = getSetLog(bi, ei, r);
      const isDone = log && log.done;
      const isActive = isCurrentRound && ei === currentExInRound && !isDone;

      roundsHtml += `
        <div class="set-row ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}" style="margin-bottom:4px">
          <div class="set-number" style="width:40px">${labels[ei]}</div>
          <div style="flex:1;font-size:13px;font-weight:600;${isDone ? 'text-decoration:line-through;opacity:0.5' : ''}">${esc(ex.name)}</div>
          <div class="set-field">
            <input class="set-input" type="number" inputmode="decimal" value="${log ? log.weight : ex.weight || ''}"
              onchange="updateSetLog(${bi},${ei},${r},'weight',+this.value)" placeholder="${ex.weight || '—'}" style="width:56px">
            <span class="set-input-label">kg</span>
          </div>
          <div class="set-field">
            <input class="set-input" type="number" inputmode="numeric" value="${log ? log.reps : ex.reps || ''}"
              onchange="updateSetLog(${bi},${ei},${r},'reps',+this.value)" placeholder="${ex.reps || '—'}" style="width:56px">
            <span class="set-input-label">reps</span>
          </div>
          <button class="set-check ${isDone ? 'done' : ''}" onclick="completeSupersetExercise(${r},${ei})">✓</button>
        </div>`;
    });
  }

  return `
    <div class="current-exercise">
      <div class="exercise-label">Superset · Round ${currentRound + 1}/${maxSets}</div>
      <div class="exercise-title">${labels[currentExInRound]}: ${esc(currentEx.name)}</div>
      <div class="exercise-prescription">${block.exercises.map((e, i) => `${labels[i]}: ${e.reps} reps`).join(' · ')}</div>
    </div>
    ${restDisplay}
    <div class="set-tracker" style="padding:0 16px">${roundsHtml}</div>`;
}

function renderEmomBlock(block) {
  const totalRounds = block.duration || 10;
  const ex = block.exercises[activeSession.currentExercise] || block.exercises[0];
  const timeLeft = Math.max(0, Math.ceil(activeSession.timerSeconds));

  let dotsHtml = '';
  for (let i = 0; i < totalRounds; i++) {
    const cls = i < activeSession.emomCurrentRound ? 'done' : (i === activeSession.emomCurrentRound && activeSession.timerRunning ? 'active' : '');
    dotsHtml += `<div class="emom-dot ${cls}"></div>`;
  }

  return `
    <div class="current-exercise">
      <div class="exercise-label">EMOM · Round ${activeSession.emomCurrentRound + 1}/${totalRounds}</div>
      <div class="exercise-title">${esc(ex.name)}</div>
      <div class="exercise-prescription">${ex.reps || 0} reps</div>
    </div>
    <div class="timer-display">
      <div class="timer-value">${timeLeft}</div>
      <div class="timer-label">Seconds remaining</div>
    </div>
    <div class="emom-progress">${dotsHtml}</div>
    <div class="timer-controls">
      ${!activeSession.timerRunning ?
        `<button class="btn btn-primary" onclick="startEmom()">▶ ${activeSession.emomCurrentRound === 0 ? 'Start' : 'Resume'}</button>` :
        `<button class="btn btn-secondary" onclick="pauseTimer()">❚❚ Pause</button>`}
    </div>`;
}

function renderAmrapBlock(block) {
  const totalMin = block.duration || 10;
  const timeLeft = Math.max(0, Math.ceil(activeSession.timerSeconds));
  const exerciseList = block.exercises.map(e => `${e.reps} ${e.name}`).join(' + ');

  return `
    <div class="current-exercise">
      <div class="exercise-label">AMRAP · ${totalMin} Minutes</div>
      <div class="exercise-title">${exerciseList || 'No exercises'}</div>
    </div>
    <div class="timer-display">
      <div class="timer-value">${formatTime(timeLeft)}</div>
      <div class="timer-label">${activeSession.timerRunning ? 'Time remaining' : 'Ready'}</div>
    </div>
    <div class="round-counter">
      <button onclick="adjustAmrap(-1)">−</button>
      <div class="round-value">${activeSession.amrapRounds}</div>
      <button onclick="adjustAmrap(1)">+</button>
    </div>
    <div style="text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:16px">Rounds completed</div>
    <div class="timer-controls">
      ${!activeSession.timerRunning ?
        `<button class="btn btn-primary" onclick="startAmrap()">▶ ${activeSession.timerSeconds > 0 ? 'Resume' : 'Start'}</button>` :
        `<button class="btn btn-secondary" onclick="pauseTimer()">❚❚ Pause</button>`}
    </div>`;
}

function renderTimerDisplay() {
  if (!activeSession) return;
  const block = activeSession.blocks[activeSession.currentBlock];
  if (!block) return;

  const elapsed = sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : '00:00';
  const elapsedEl = document.querySelector('.workout-elapsed');
  if (elapsedEl) elapsedEl.textContent = `${elapsed} · Block ${activeSession.currentBlock + 1}/${activeSession.blocks.length}`;

  const timerEl = document.querySelector('.timer-value');
  if (!timerEl) return;

  if (block.mode === 'strength' && activeSession.isResting) {
    timerEl.textContent = Math.ceil(activeSession.restSeconds);
  } else if (block.mode === 'emom') {
    timerEl.textContent = Math.max(0, Math.ceil(activeSession.timerSeconds));
    const roundLabel = document.querySelector('.exercise-label');
    if (roundLabel) roundLabel.textContent = `EMOM · Round ${activeSession.emomCurrentRound + 1}/${block.duration || 10}`;
  } else if (block.mode === 'amrap') {
    timerEl.textContent = formatTime(Math.max(0, Math.ceil(activeSession.timerSeconds)));
  }
}

// Strength helpers
function getSetLog(bi, ei, si) {
  return activeSession.setLogs.find(l => l.bi === bi && l.ei === ei && l.si === si);
}

function updateSetLog(bi, ei, si, field, value) {
  let log = getSetLog(bi, ei, si);
  if (!log) {
    log = { bi, ei, si, weight: 0, reps: 0, done: false };
    activeSession.setLogs.push(log);
  }
  log[field] = value;
}

function completeSet(si) {
  const bi = activeSession.currentBlock;
  const ei = activeSession.currentExercise;
  const block = activeSession.blocks[bi];
  const ex = block.exercises[ei];

  let log = getSetLog(bi, ei, si);
  if (!log) {
    log = { bi, ei, si, weight: ex.weight || 0, reps: ex.reps || 0, done: false };
    activeSession.setLogs.push(log);
  }
  log.done = !log.done;

  if (log.done) {
    const allDone = Array.from({ length: ex.sets || 3 }, (_, i) => i)
      .every(i => { const l = getSetLog(bi, ei, i); return l && l.done; });

    if (allDone) {
      if (activeSession.currentExercise < block.exercises.length - 1) {
        activeSession.currentExercise++;
        activeSession.currentSet = 0;
      } else {
        nextBlock();
        return;
      }
    } else {
      activeSession.currentSet = si + 1;
      activeSession.isResting = true;
      activeSession.restSeconds = ex.rest || 60;
      activeSession.timerRunning = true;
    }
  }

  renderTrainView();
}

function completeSupersetExercise(round, ei) {
  const bi = activeSession.currentBlock;
  const block = activeSession.blocks[bi];
  const ex = block.exercises[ei];

  let log = getSetLog(bi, ei, round);
  if (!log) {
    log = { bi, ei, si: round, weight: ex.weight || 0, reps: ex.reps || 0, done: false };
    activeSession.setLogs.push(log);
  }
  log.done = !log.done;

  if (log.done) {
    const maxSets = Math.max(...block.exercises.map(e => e.sets || 3));
    const roundDone = block.exercises.every((e, i) => {
      if (round >= (e.sets || 3)) return true;
      const l = getSetLog(bi, i, round);
      return l && l.done;
    });

    if (roundDone) {
      const nextRound = round + 1;
      if (nextRound >= maxSets) {
        nextBlock();
        return;
      }
      activeSession.supersetRound = nextRound;
      activeSession.supersetExIndex = 0;
      const lastEx = block.exercises[block.exercises.length - 1];
      activeSession.isResting = true;
      activeSession.restSeconds = lastEx.rest || 60;
      activeSession.timerRunning = true;
    } else {
      let nextEi = ei + 1;
      while (nextEi < block.exercises.length && round >= (block.exercises[nextEi].sets || 3)) {
        nextEi++;
      }
      if (nextEi < block.exercises.length) {
        activeSession.supersetExIndex = nextEi;
      }
    }
  }

  renderTrainView();
}

function adjustRest(delta) {
  activeSession.restSeconds = Math.max(0, activeSession.restSeconds + delta);
}

function skipRest() {
  activeSession.isResting = false;
  activeSession.timerRunning = false;
  activeSession.restSeconds = 0;
  renderTrainView();
}

function switchExercise(idx) {
  activeSession.currentExercise = idx;
  activeSession.currentSet = 0;
  activeSession.isResting = false;
  activeSession.timerRunning = false;
  renderTrainView();
}

// EMOM helpers
function startEmom() {
  const block = activeSession.blocks[activeSession.currentBlock];
  if (activeSession.timerSeconds <= 0) {
    activeSession.timerSeconds = block.interval || 60;
    activeSession.emomCurrentRound = 0;
    activeSession.currentExercise = 0;
  }
  activeSession.timerRunning = true;
  renderTrainView();
}

// AMRAP helpers
function startAmrap() {
  const block = activeSession.blocks[activeSession.currentBlock];
  if (activeSession.timerSeconds <= 0) {
    activeSession.timerSeconds = (block.duration || 10) * 60;
    activeSession.amrapRounds = 0;
  }
  activeSession.timerRunning = true;
  renderTrainView();
}

function adjustAmrap(delta) {
  activeSession.amrapRounds = Math.max(0, activeSession.amrapRounds + delta);
  const el = document.querySelector('.round-value');
  if (el) el.textContent = activeSession.amrapRounds;
}

function pauseTimer() {
  activeSession.timerRunning = false;
  renderTrainView();
}

function nextBlock() {
  activeSession.currentBlock++;
  activeSession.currentExercise = 0;
  activeSession.currentSet = 0;
  activeSession.timerRunning = false;
  activeSession.timerSeconds = 0;
  activeSession.isResting = false;
  activeSession.emomCurrentRound = 0;
  activeSession.amrapRounds = 0;
  activeSession.supersetRound = 0;
  activeSession.supersetExIndex = 0;
  renderTrainView();
}

// ═══════════════════════════════════════
// WORKOUT COMPLETE
// ═══════════════════════════════════════
function renderWorkoutComplete() {
  const duration = sessionStartTime ? Math.floor((Date.now() - sessionStartTime) / 1000) : 0;
  const totalSets = activeSession.setLogs.filter(l => l.done).length;
  const totalVolume = activeSession.setLogs.filter(l => l.done).reduce((s, l) => s + (l.weight * l.reps), 0);

  document.getElementById('train-content').innerHTML = `
    <div class="workout-summary">
      <div class="check-circle">✓</div>
      <h2>Workout Complete</h2>
      <p style="color:var(--text-secondary)">${esc(activeSession.templateName)}</p>
      <div class="summary-stats">
        <div class="summary-stat">
          <div class="s-value">${formatTime(duration)}</div>
          <div class="s-label">Duration</div>
        </div>
        <div class="summary-stat">
          <div class="s-value">${totalSets}</div>
          <div class="s-label">Sets</div>
        </div>
        <div class="summary-stat">
          <div class="s-value">${totalVolume > 0 ? Math.round(totalVolume).toLocaleString() : '—'}</div>
          <div class="s-label">Volume (kg)</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveSession()">Save & Close</button>
    </div>`;
}

function finishWorkout() {
  if (!confirm('End this workout?')) return;
  activeSession.currentBlock = activeSession.blocks.length;
  renderWorkoutComplete();
}

function saveSession() {
  const duration = sessionStartTime ? Math.floor((Date.now() - sessionStartTime) / 1000) : 0;
  const entry = {
    id: uid(),
    templateName: activeSession.templateName,
    date: activeSession.startedAt,
    duration,
    blocks: activeSession.blocks,
    setLogs: activeSession.setLogs,
    amrapRounds: activeSession.amrapRounds,
  };

  history.unshift(entry);
  DB.set('history', history);

  if (timerInterval) clearInterval(timerInterval);
  activeSession = null;
  sessionStartTime = null;
  switchTab('history');
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#128202;</div>
        <h3>No History Yet</h3>
        <p>Complete a workout to see it here.</p>
      </div>`;
    return;
  }

  let lastDate = '';
  el.innerHTML = history.map(h => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const showDate = dateStr !== lastDate;
    lastDate = dateStr;
    const totalSets = (h.setLogs || []).filter(l => l.done).length;
    const volume = (h.setLogs || []).filter(l => l.done).reduce((s, l) => s + (l.weight * l.reps), 0);

    return `
      ${showDate ? `<div class="history-date">${dateStr}</div>` : ''}
      <div class="card history-card" onclick="showHistoryDetail('${h.id}')">
        <div class="card-title">${esc(h.templateName)}</div>
        <div class="card-subtitle">${d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })} · ${formatTime(h.duration || 0)}</div>
        <div class="history-stats">
          <div class="history-stat">
            <div class="stat-value">${totalSets}</div>
            <div class="stat-label">Sets</div>
          </div>
          ${volume > 0 ? `
          <div class="history-stat">
            <div class="stat-value">${Math.round(volume).toLocaleString()}</div>
            <div class="stat-label">Volume (kg)</div>
          </div>` : ''}
          ${h.amrapRounds ? `
          <div class="history-stat">
            <div class="stat-value">${h.amrapRounds}</div>
            <div class="stat-label">Rounds</div>
          </div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function showHistoryDetail(id) {
  const h = history.find(x => x.id === id);
  if (!h) return;
  const logs = h.setLogs || [];

  let html = `<h2>${esc(h.templateName)}</h2>
    <p style="color:var(--text-secondary);margin-bottom:16px">${new Date(h.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} · ${formatTime(h.duration || 0)}</p>`;

  (h.blocks || []).forEach((block, bi) => {
    html += `<div class="block-header"><span class="block-label">${block.mode.toUpperCase()}</span><span class="block-line"></span></div>`;
    block.exercises.forEach((ex, ei) => {
      const exLogs = logs.filter(l => l.bi === bi && l.ei === ei && l.done);
      html += `<div style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">${esc(ex.name)}</div>`;
      if (exLogs.length > 0) {
        html += exLogs.map(l => `<div style="font-size:13px;color:var(--text-secondary)">${l.weight}kg × ${l.reps}</div>`).join('');
      } else if (block.mode === 'amrap' && h.amrapRounds) {
        html += `<div style="font-size:13px;color:var(--text-secondary)">${h.amrapRounds} rounds</div>`;
      }
      html += '</div>';
    });
  });

  document.getElementById('history-detail-content').innerHTML = html;
  openModal('modal-history-detail');
}

// ═══════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════
function exportCSV() {
  let csv = 'Date,Workout,Exercise,Set,Weight (kg),Reps,Mode\n';
  history.forEach(h => {
    const date = new Date(h.date).toISOString().split('T')[0];
    (h.blocks || []).forEach((block, bi) => {
      block.exercises.forEach((ex, ei) => {
        const logs = (h.setLogs || []).filter(l => l.bi === bi && l.ei === ei && l.done);
        if (logs.length > 0) {
          logs.forEach(l => {
            csv += `${date},${csvEsc(h.templateName)},${csvEsc(ex.name)},${l.si + 1},${l.weight},${l.reps},${block.mode}\n`;
          });
        } else if (block.mode === 'amrap') {
          csv += `${date},${csvEsc(h.templateName)},${csvEsc(ex.name)},,,,amrap (${h.amrapRounds || 0} rounds)\n`;
        } else if (block.mode === 'emom') {
          csv += `${date},${csvEsc(h.templateName)},${csvEsc(ex.name)},,,${ex.reps || ''},emom\n`;
        }
      });
    });
  });
  download('rxlog_history.csv', csv, 'text/csv');
}

function exportJSON() {
  download('rxlog_history.json', JSON.stringify(history, null, 2), 'application/json');
}

function exportTemplates() {
  download('rxlog_templates.json', JSON.stringify(workouts, null, 2), 'application/json');
}

function importTemplates(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        imported.forEach(w => { w.id = uid(); workouts.push(w); });
        DB.set('workouts', workouts);
        renderWorkouts();
        alert(`Imported ${imported.length} workout(s)`);
      }
    } catch { alert('Invalid file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2, 10); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function csvEsc(s) { return '"' + (s || '').replace(/"/g, '""') + '"'; }

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m.toString().padStart(2,'0')}:${Math.floor(s).toString().padStart(2,'0')}`;
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(200);
}

function openModal(id) {
  document.getElementById(id).classList.add('active');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
renderWorkouts();
</script>
</body>
</html>
