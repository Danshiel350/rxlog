<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<title>RXLOG</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0A0A0A;
  --surface: #141414;
  --surface-2: #1E1E1E;
  --surface-3: #282828;
  --accent: #CCFF00;
  --accent-dim: #99cc00;
  --accent-bg: rgba(204, 255, 0, 0.08);
  --accent-bg-2: rgba(204, 255, 0, 0.15);
  --text: #FFFFFF;
  --text-secondary: #999999;
  --text-muted: #555555;
  --danger: #FF4444;
  --danger-bg: rgba(255, 68, 68, 0.1);
  --success: #00CC66;
  --radius: 14px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}

body {
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ── NAV ── */
.tab-bar {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--surface-3);
  padding: 6px 0 calc(6px + var(--safe-bottom));
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}

.tab-bar button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 8px 0 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: color 0.2s;
}

.tab-bar button.active { color: var(--accent); }
.tab-bar button svg { width: 22px; height: 22px; }

/* ── VIEWS ── */
.view {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: none;
  -webkit-overflow-scrolling: touch;
}

.view.active { display: flex; flex-direction: column; }

.view-header {
  padding: 16px 20px 12px;
  flex-shrink: 0;
}

.view-header h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.view-header h1 span { color: var(--accent); }

.view-content {
  flex: 1;
  padding: 0 16px 24px;
  overflow-y: auto;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}

.card:active { border-color: var(--surface-3); }

.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}

.card-meta {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--surface-2);
  color: var(--text-secondary);
}

.meta-tag.accent {
  background: var(--accent-bg);
  color: var(--accent);
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  letter-spacing: 0.3px;
}

.btn-primary {
  background: var(--accent);
  color: #0A0A0A;
}

.btn-primary:active { background: var(--accent-dim); }

.btn-secondary {
  background: var(--surface-2);
  color: var(--text);
}

.btn-secondary:active { background: var(--surface-3); }

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
}

.btn-ghost {
  background: none;
  color: var(--accent);
  padding: 10px;
}

.btn-sm {
  padding: 10px 16px;
  font-size: 13px;
  width: auto;
}

/* ── FORMS ── */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--accent); }

.form-input::placeholder { color: var(--text-muted); }

.form-row {
  display: flex;
  gap: 10px;
}

.form-row > * { flex: 1; }

/* ── MODE SELECTOR ── */
.mode-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  background: var(--surface-2);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.mode-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}

/* ── EXERCISE LIST (builder) ── */
.exercise-item {
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.exercise-item .drag-handle {
  color: var(--text-muted);
  font-size: 18px;
  cursor: grab;
  flex-shrink: 0;
}

.exercise-item .exercise-info { flex: 1; }

.exercise-item .exercise-name {
  font-size: 14px;
  font-weight: 600;
}

.exercise-item .exercise-detail {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.exercise-item .remove-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.exercise-item .remove-btn:active { color: var(--danger); }

/* ── ACTIVE WORKOUT ── */
.workout-active-header {
  text-align: center;
  padding: 20px 16px 8px;
}

.workout-active-header .workout-name {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
}

.workout-active-header .workout-elapsed {
  font-size: 14px;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}

.timer-display {
  text-align: center;
  padding: 24px 16px;
}

.timer-display .timer-value {
  font-size: 72px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -2px;
  color: var(--accent);
  line-height: 1;
}

.timer-display .timer-label {
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 8px;
}

.timer-controls {
  display: flex;
  gap: 12px;
  padding: 0 16px;
  margin-bottom: 16px;
}

.timer-controls .btn { flex: 1; }

.current-exercise {
  text-align: center;
  padding: 16px;
}

.current-exercise .exercise-label {
  font-size: 12px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.current-exercise .exercise-title {
  font-size: 24px;
  font-weight: 800;
  margin: 6px 0;
}

.current-exercise .exercise-prescription {
  font-size: 15px;
  color: var(--text-secondary);
}

.set-tracker {
  padding: 0 16px;
}

.set-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
}

.set-row.active {
  background: var(--accent-bg);
  border: 1px solid var(--accent);
}

.set-row.completed {
  opacity: 0.5;
}

.set-row.skipped {
  opacity: 0.35;
}

.set-row.skipped .set-number::after {
  content: ' skip';
  font-size: 9px;
  color: var(--text-muted);
}

.set-skip {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--surface-3);
  background: none;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.set-skip.done {
  border-color: var(--danger);
  color: var(--danger);
}

.train-block-section {
  margin-bottom: 24px;
  scroll-margin-top: 80px;
}

.train-block-section.future {
  opacity: 0.4;
}

.train-exercise-header {
  padding: 12px 16px 6px;
  font-weight: 700;
  font-size: 16px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.train-exercise-header .ex-prescription {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 400;
}

.train-exercise-header .ex-last {
  font-size: 11px;
  color: var(--accent);
  font-weight: 400;
  margin-left: auto;
}

.exercise-history-modal-body {
  max-height: 60vh;
  overflow-y: auto;
  padding: 0 4px;
}

.ex-history-session {
  margin-bottom: 16px;
}

.ex-history-session .session-date {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.ex-history-session .session-sets {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.ex-history-session .set-pill {
  padding: 4px 10px;
  background: var(--surface);
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}

.set-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  width: 32px;
}

.set-row.active .set-number { color: var(--accent); }

.set-input {
  width: 64px;
  padding: 8px;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  text-align: center;
  font-family: inherit;
  font-weight: 600;
  outline: none;
}

.set-input:focus { border-color: var(--accent); }

.set-input-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.set-field {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.set-check {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--surface-3);
  background: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: auto;
  flex-shrink: 0;
  transition: all 0.2s;
}

.set-check.done {
  background: var(--accent);
  border-color: var(--accent);
  color: #0A0A0A;
}

/* ── HISTORY ── */
.history-date {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  padding: 16px 4px 8px;
}

.history-card {
  cursor: pointer;
}

.history-stats {
  display: flex;
  gap: 16px;
  margin-top: 10px;
}

.history-stat .stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}

.history-stat .stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  animation: slideUp 0.25s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--surface-3);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal h2 {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 20px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 32px;
  color: var(--text-secondary);
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.3;
}

.empty-state h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 14px;
  line-height: 1.5;
  margin-bottom: 24px;
}

/* ── TIMER EDIT INLINE ── */
.timer-edit-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}

.timer-edit-input {
  width: 56px;
  padding: 6px;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-radius: 8px;
  color: var(--accent);
  font-size: 18px;
  text-align: center;
  font-weight: 700;
  font-family: inherit;
  outline: none;
}

.timer-edit-input:focus { border-color: var(--accent); }

.timer-edit-label {
  font-size: 12px;
  color: var(--text-muted);
}

/* ── ROUND COUNTER (AMRAP) ── */
.round-counter {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 16px;
}

.round-counter .round-value {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  min-width: 60px;
  text-align: center;
}

.round-counter button {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--surface-3);
  background: var(--surface-2);
  color: var(--text);
  font-size: 24px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.round-counter button:active {
  background: var(--accent-bg);
  border-color: var(--accent);
}

/* ── BLOCK DIVIDER ── */
.block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 0 8px;
}

.block-header .block-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  white-space: nowrap;
}

.block-label-input {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  background: none;
  border: none;
  border-bottom: 1px dashed var(--surface-3);
  padding: 2px 0;
  width: 120px;
  outline: none;
  font-family: inherit;
}

.block-label-input:focus {
  border-bottom-color: var(--accent);
}

.block-label-input::placeholder {
  color: var(--accent);
  opacity: 0.6;
}

.block-header .block-line {
  flex: 1;
  height: 1px;
  background: var(--surface-3);
}

/* ── SUPERSET GROUP (builder) ── */
.superset-group {
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 8px;
  background: var(--accent-bg);
  position: relative;
}

.superset-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.superset-group-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--accent);
}

.superset-group .exercise-item {
  background: var(--surface);
  margin-bottom: 6px;
}

.superset-group .exercise-item:last-of-type {
  margin-bottom: 0;
}

.ss-letter {
  font-size: 12px;
  font-weight: 800;
  color: var(--accent);
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.ss-connector {
  width: 2px;
  height: 8px;
  background: var(--accent);
  opacity: 0.4;
  margin: 0 auto;
}

/* scrollbar */
::-webkit-scrollbar { width: 0; }

/* number input arrows */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type="number"] { -moz-appearance: textfield; }

.fab {
  position: fixed;
  bottom: calc(72px + var(--safe-bottom));
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: #0A0A0A;
  border: none;
  font-size: 28px;
  font-weight: 300;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(204, 255, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 90;
  transition: transform 0.15s;
}

.fab:active { transform: scale(0.92); }
.fab.hidden { display: none; }

/* ── EMOM INTERVAL INDICATOR ── */
.emom-progress {
  display: flex;
  gap: 4px;
  padding: 0 16px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.emom-dot {
  height: 6px;
  flex: 1;
  min-width: 8px;
  border-radius: 3px;
  background: var(--surface-3);
  transition: background 0.3s;
}

.emom-dot.done { background: var(--accent); }
.emom-dot.active { background: var(--accent); animation: pulse 1s infinite; }

.emom-exercise-list {
  padding: 0 16px;
  margin-bottom: 16px;
}

.emom-exercise-row {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  background: var(--surface-2);
  transition: all 0.3s;
}

.emom-exercise-row.current {
  background: var(--accent-bg-2);
  border: 2px solid var(--accent);
}

.emom-exercise-name {
  font-size: 15px;
  font-weight: 700;
}

.emom-exercise-row.current .emom-exercise-name {
  color: var(--accent);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ── WORKOUT COMPLETE ── */
.workout-summary {
  text-align: center;
  padding: 40px 24px;
}

.workout-summary .check-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--accent);
  color: #0A0A0A;
  font-size: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
}

.workout-summary h2 {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 4px;
}

.summary-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 24px 0;
}

.summary-stat .s-value {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent);
}

.summary-stat .s-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── AUTOCOMPLETE ── */
.autocomplete-wrap {
  position: relative;
}

.autocomplete-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--surface-2);
  border: 1px solid var(--surface-3);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  max-height: 180px;
  overflow-y: auto;
  z-index: 300;
  display: none;
}

.autocomplete-list.visible { display: block; }

.autocomplete-item {
  padding: 12px 16px;
  font-size: 15px;
  color: var(--text);
  cursor: pointer;
  border-bottom: 1px solid var(--surface-3);
}

.autocomplete-item:last-child { border-bottom: none; }

.autocomplete-item:active,
.autocomplete-item.highlighted {
  background: var(--accent-bg);
  color: var(--accent);
}

.autocomplete-item .ac-category {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: 8px;
}

.autocomplete-item.ac-add {
  color: var(--accent);
  font-weight: 600;
}

/* ── EXERCISE LIBRARY ── */
.exercise-lib-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;

.exercise-lib-item .lib-category {

</style>
</head>

<div class="modal-overlay" id="modal-exercise-history">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="exercise-history-content"></div>
    <button class="btn btn-secondary" onclick="closeModal('modal-exercise-history')" style="margin-top:16px">Close</button>
  </div>
</div>

<script>
const DB = {
  get(key, fallback) {
    try { const v = localStorage.getItem('rxlog_' + key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  },
  set(key, val) { localStorage.setItem('rxlog_' + key, JSON.stringify(val)); },
};

let workouts = DB.get('workouts', []);
let history = DB.get('history', []);
let exerciseLibrary = DB.get('exerciseLibrary', []);
let activeSession = null;
let timerInterval = null;
let sessionStartTime = null;
let editingWorkoutId = null;
let currentBlockIndex = null;
let currentSupersetId = null;
let editingLibExerciseId = null;

// Bootstrap library from existing workouts/history if empty
if (exerciseLibrary.length === 0) {
  const names = new Set();
  workouts.forEach(w => w.blocks.forEach(b => b.exercises.forEach(e => names.add(e.name))));
  history.forEach(h => (h.blocks || []).forEach(b => b.exercises.forEach(e => names.add(e.name))));
  names.forEach(name => { if (name) exerciseLibrary.push({ id: uid(), name, category: '' }); });
  if (exerciseLibrary.length > 0) DB.set('exerciseLibrary', exerciseLibrary);
}


function renderExerciseLibrary() {
  const el = document.getElementById('exercise-lib-list');
  if (!el) return;
  const query = (document.getElementById('exercise-lib-search')?.value || '').toLowerCase();
  const filtered = exerciseLibrary.filter(e => !query || e.name.toLowerCase().includes(query));
  filtered.sort((a, b) => a.name.localeCompare(b.name));

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:32px"><p>${query ? 'No matches' : 'No exercises yet. Add one or build a workout.'}</p></div>`;
    return;
  }

  el.innerHTML = filtered.map(e => `
    <div class="exercise-lib-item">
      <div class="lib-name" onclick="showExerciseHistory('${esc(e.name).replace(/'/g, "\\'")}')" style="cursor:pointer">${esc(e.name)}</div>
      <div style="display:flex;align-items:center;gap:6px">
        ${e.measure === 'time' ? '<span class="lib-category">Time</span>' : e.measure === 'distance' ? '<span class="lib-category">Distance</span>' : ''}
        ${e.category ? `<span class="lib-category">${esc(e.category)}</span>` : ''}
      </div>
      <div class="lib-actions">
        <button onclick="editLibraryExercise('${e.id}')">✎</button>
        <button onclick="deleteLibraryExercise('${e.id}')">×</button>
      </div>
    </div>
  `).join('');
}

let libMeasure = 'weight';

function setLibMeasure(m) {
  libMeasure = m;
  document.querySelectorAll('#lib-exercise-measure .mode-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(m));
  });
}

function getExerciseMeasure(name) {
  const lib = exerciseLibrary.find(e => e.name.toLowerCase() === (name || '').toLowerCase());
  return (lib && lib.measure) || 'weight';
}

function formatDuration(sec) {
  if (!sec) return '0:00';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function openAddLibraryExercise() {
  editingLibExerciseId = null;
  document.getElementById('modal-lib-exercise-title').textContent = 'New Exercise';
  document.getElementById('lib-exercise-name').value = '';
  document.getElementById('lib-exercise-category').value = '';
  setLibMeasure('weight');
  openModal('modal-lib-exercise');
}

function editLibraryExercise(id) {
  const ex = exerciseLibrary.find(e => e.id === id);
  if (!ex) return;
  editingLibExerciseId = id;
  document.getElementById('modal-lib-exercise-title').textContent = 'Edit Exercise';
  document.getElementById('lib-exercise-name').value = ex.name;
  document.getElementById('lib-exercise-category').value = ex.category || '';
  setLibMeasure(ex.measure || 'weight');
  openModal('modal-lib-exercise');
}

function saveLibraryExercise() {
  const name = document.getElementById('lib-exercise-name').value.trim();
  if (!name) return;
  const category = document.getElementById('lib-exercise-category').value.trim();

  if (editingLibExerciseId) {
    const ex = exerciseLibrary.find(e => e.id === editingLibExerciseId);
    if (ex) {
      const oldName = ex.name;
      ex.name = name;
      ex.category = category;
      ex.measure = libMeasure;
      if (oldName !== name) {
        workouts.forEach(w => w.blocks.forEach(b => b.exercises.forEach(e => { if (e.name === oldName) e.name = name; })));
        DB.set('workouts', workouts);
      }
    }
  } else {
    const dupe = exerciseLibrary.some(e => e.name.toLowerCase() === name.toLowerCase());
    if (dupe) { closeModal('modal-lib-exercise'); return; }
    exerciseLibrary.push({ id: uid(), name, category, measure: libMeasure });
  }

  DB.set('exerciseLibrary', exerciseLibrary);
  closeModal('modal-lib-exercise');
  renderExerciseLibrary();
}

function deleteLibraryExercise(id) {
  if (!confirm('Remove from library? This won\'t affect saved workouts.')) return;
  exerciseLibrary = exerciseLibrary.filter(e => e.id !== id);
  DB.set('exerciseLibrary', exerciseLibrary);
  renderExerciseLibrary();
}

// Autocomplete for exercise name in workout builder
let selectedLibraryExercise = null;

function onExerciseNameInput() {
  const input = document.getElementById('exercise-name');
  const list = document.getElementById('exercise-ac-list');
  const query = input.value.trim().toLowerCase();
  selectedLibraryExercise = null;

  if (!query) {
    list.classList.remove('visible');
    if (exerciseLibrary.length === 0) {
      list.innerHTML = '<div class="autocomplete-item ac-add" style="pointer-events:none;opacity:0.5">No exercises yet — add some in the Exercises tab</div>';
      list.classList.add('visible');
    }
    return;
  }

  const matches = exerciseLibrary
    .filter(e => e.name.toLowerCase().includes(query))
    .sort((a, b) => {
      const aStarts = a.name.toLowerCase().startsWith(query) ? 0 : 1;
      const bStarts = b.name.toLowerCase().startsWith(query) ? 0 : 1;
      return aStarts - bStarts || a.name.localeCompare(b.name);
    })
    .slice(0, 8);

  let html = matches.map(e => {
    const mLabel = e.measure === 'time' ? '⏱' : e.measure === 'distance' ? '📏' : '';
    return `<div class="autocomplete-item" onmousedown="selectExerciseAc('${esc(e.name).replace(/'/g, "\\'")}')">
      ${esc(e.name)}${e.category ? `<span class="ac-category">${esc(e.category)}</span>` : ''}${mLabel ? `<span class="ac-category">${mLabel}</span>` : ''}
    </div>`;
  }).join('');

  if (matches.length === 0) {
    html = '<div class="autocomplete-item ac-add" style="pointer-events:none;opacity:0.5">No matches — add it in the Exercises tab</div>';
  }

  list.innerHTML = html;
  list.classList.add('visible');
}

function selectExerciseAc(name) {
  document.getElementById('exercise-name').value = name;
  document.getElementById('exercise-ac-list').classList.remove('visible');
  selectedLibraryExercise = name;
  applyMeasureToBuilder(name);
}

function applyMeasureToBuilder(name) {
  const measure = getExerciseMeasure(name);
  const label = document.getElementById('exercise-weight-label');
  const input = document.getElementById('exercise-weight');
  if (measure === 'time') {
    label.textContent = 'Duration (seconds)';
    input.placeholder = 'e.g. 120';
  } else if (measure === 'distance') {
    label.textContent = 'Distance (metres)';
    input.placeholder = 'e.g. 20';
  } else {
    label.textContent = 'Weight hint (optional)';
    input.placeholder = 'e.g. 80';
  }
}

document.addEventListener('click', e => {
  const list = document.getElementById('exercise-ac-list');
  if (list && !e.target.closest('.autocomplete-wrap')) list.classList.remove('visible');
});

function getEntries(block) {
  if (block.mode !== 'strength') return block.exercises.map((ex, i) => ({ type: 'exercise', ex, idx: i }));
  const entries = [];
  const seen = new Set();
  for (let i = 0; i < block.exercises.length; i++) {
    const ex = block.exercises[i];
    if (ex.ssId) {
      if (seen.has(ex.ssId)) continue;
      seen.add(ex.ssId);
      const group = [];
      block.exercises.forEach((e, j) => { if (e.ssId === ex.ssId) group.push({ ex: e, idx: j }); });
      entries.push({ type: 'superset', ssId: ex.ssId, exercises: group });
    } else {
      entries.push({ type: 'exercise', ex, idx: i });
    }
  }
  return entries;
}

function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  const fab = document.getElementById('fab');
  fab.className = 'fab' + (name !== 'workouts' ? ' hidden' : '');
  if (name === 'history') renderHistory();
  if (name === 'workouts') renderWorkouts();
  if (name === 'exercises') renderExerciseLibrary();
}

function renderWorkouts() {
  const el = document.getElementById('workouts-list');
  if (workouts.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">&#9775;</div>
        <h3>No Workouts Yet</h3>
        <p>Create your first workout template to get started.</p>
        <button class="btn btn-primary btn-sm" onclick="openNewWorkout()" style="width:auto;margin:0 auto">Create Workout</button>
      </div>`;
    return;
  }
  el.innerHTML = workouts.map(w => {
    const totalExercises = w.blocks.reduce((sum, b) => sum + b.exercises.length, 0);
    const modes = [...new Set(w.blocks.map(b => b.mode))];
    const hasSS = w.blocks.some(b => b.exercises.some(e => e.ssId));
    return `
      <div class="card" onclick="startWorkout('${w.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div class="card-title">${esc(w.name)}</div>
            <div class="card-subtitle">${totalExercises} exercise${totalExercises !== 1 ? 's' : ''} · ${w.blocks.length} block${w.blocks.length !== 1 ? 's' : ''}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-ghost btn-sm" onclick="event.stopPropagation();duplicateWorkout('${w.id}')" style="font-size:14px;padding:6px"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5"/></svg></button>
            <button class="btn-ghost btn-sm" onclick="event.stopPropagation();editWorkout('${w.id}')" style="font-size:16px;padding:6px">&#9998;</button>
            <button class="btn-ghost btn-sm" onclick="event.stopPropagation();deleteWorkout('${w.id}')" style="font-size:16px;padding:6px;color:var(--danger)">&#10005;</button>
          </div>
        </div>
        <div class="card-meta">
          ${modes.map(m => `<span class="meta-tag accent">${m}</span>`).join('')}
          ${hasSS ? '<span class="meta-tag accent">superset</span>' : ''}
        </div>
      </div>`;
  }).join('');
}

let builderBlocks = [];

function openNewWorkout() {
  editingWorkoutId = null;
  document.getElementById('modal-workout-title').textContent = 'New Workout';
  document.getElementById('workout-name').value = '';
  builderBlocks = [];
  addBlock();
  openModal('modal-workout');
}

function editWorkout(id) {
  const w = workouts.find(x => x.id === id);
  if (!w) return;
  editingWorkoutId = id;
  document.getElementById('modal-workout-title').textContent = 'Edit Workout';
  document.getElementById('workout-name').value = w.name;
  builderBlocks = JSON.parse(JSON.stringify(w.blocks));
  renderBlocks();
  openModal('modal-workout');
}

function addBlock() {
  builderBlocks.push({ mode: 'strength', exercises: [], duration: 10, interval: 60, label: '' });
  renderBlocks();
}

function renderBlocks() {
  const container = document.getElementById('blocks-container');
  container.innerHTML = builderBlocks.map((block, bi) => {
    let extraFields = '';

    if (block.mode === 'emom') {
      extraFields = `
        <div class="form-row" style="margin-bottom:12px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Rounds</label>
            <input class="form-input" type="number" value="${block.duration || 10}" inputmode="numeric"
              onchange="builderBlocks[${bi}].duration=+this.value">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Interval (sec)</label>
            <input class="form-input" type="number" value="${block.interval || 60}" inputmode="numeric"
              onchange="builderBlocks[${bi}].interval=+this.value">
          </div>
        </div>`;
    } else if (block.mode === 'amrap') {
      extraFields = `
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">Duration (min)</label>
          <input class="form-input" type="number" value="${block.duration || 10}" inputmode="numeric"
            onchange="builderBlocks[${bi}].duration=+this.value">
        </div>`;
    }

    let exercisesHtml = '';
    if (block.mode === 'strength') {
      const entries = getEntries(block);
      exercisesHtml = entries.map(entry => {
        if (entry.type === 'exercise') {
          return `
            <div class="exercise-item">
              <span class="drag-handle">⠇</span>
              <div class="exercise-info">
                <div class="exercise-name">${esc(entry.ex.name)}</div>
                <div class="exercise-detail">${exerciseDetail(entry.ex, 'strength')}</div>
              </div>
              <button class="remove-btn" onclick="removeExercise(${bi},${entry.idx})">×</button>
            </div>`;
        } else {
          const labels = entry.exercises.map((_, i) => String.fromCharCode(65 + i));
          const allSsIds = [...new Set(block.exercises.filter(e => e.ssId).map(e => e.ssId))];
          const ssNum = allSsIds.indexOf(entry.ssId) + 1;

          let innerHtml = entry.exercises.map((item, si) => `
            ${si > 0 ? '<div class="ss-connector"></div>' : ''}
            <div class="exercise-item">
              <span class="ss-letter">${labels[si]}</span>
              <div class="exercise-info">
                <div class="exercise-name">${esc(item.ex.name)}</div>
                <div class="exercise-detail">${exerciseDetail(item.ex, 'strength')}</div>
              </div>
              <button class="remove-btn" onclick="removeExercise(${bi},${item.idx})">×</button>
            </div>
          `).join('');

          return `
            <div class="superset-group">
              <div class="superset-group-header">
                <span class="superset-group-label">Superset ${ssNum}</span>
                <button class="remove-btn" onclick="removeSupersetGroup(${bi},'${entry.ssId}')" style="font-size:16px">×</button>
              </div>
              ${innerHtml}
              <button class="btn btn-secondary btn-sm" onclick="openAddExerciseToSuperset(${bi},'${entry.ssId}')" style="margin-top:8px;font-size:11px">+ Exercise to Superset</button>
            </div>`;
        }
      }).join('');
    } else {
      exercisesHtml = block.exercises.map((ex, ei) => `
        <div class="exercise-item">
          <span class="drag-handle">⠇</span>
          <div class="exercise-info">
            <div class="exercise-name">${esc(ex.name)}</div>
            <div class="exercise-detail">${exerciseDetail(ex, block.mode)}</div>
          </div>
          <button class="remove-btn" onclick="removeExercise(${bi},${ei})">×</button>
        </div>
      `).join('');
    }

    const buttons = block.mode === 'strength'
      ? `<div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-secondary btn-sm" onclick="openAddExercise(${bi})">+ Exercise</button>
          <button class="btn btn-secondary btn-sm" onclick="addSupersetGroup(${bi})" style="border-color:var(--accent);color:var(--accent)">+ Superset</button>
        </div>`
      : `<button class="btn btn-secondary btn-sm" onclick="openAddExercise(${bi})" style="margin-top:8px">+ Exercise</button>`;

    return `
      <div style="margin-bottom:20px">
        <div class="block-header">
          <input class="block-label-input" value="${esc(block.label || '')}" placeholder="Block ${bi + 1}"
            onchange="builderBlocks[${bi}].label=this.value.trim()">
          <span class="block-line"></span>
          ${builderBlocks.length > 1 ? `<button class="btn-ghost" style="font-size:14px;padding:4px;color:var(--danger)" onclick="removeBlock(${bi})">Remove</button>` : ''}
        </div>
        <div class="mode-selector">
          <button class="mode-btn ${block.mode === 'strength' ? 'active' : ''}" onclick="setBlockMode(${bi},'strength')">Strength</button>
          <button class="mode-btn ${block.mode === 'emom' ? 'active' : ''}" onclick="setBlockMode(${bi},'emom')">EMOM</button>
          <button class="mode-btn ${block.mode === 'amrap' ? 'active' : ''}" onclick="setBlockMode(${bi},'amrap')">AMRAP</button>
        </div>
        ${extraFields}
        <div id="block-exercises-${bi}">${exercisesHtml}</div>
        ${buttons}
      </div>`;
  }).join('');
}

function exerciseDetail(ex, mode) {
  if (mode === 'strength') {
    let detail = `${ex.sets || 0} × ${ex.reps || 0}`;
    if (ex.weight) {
      const m = getExerciseMeasure(ex.name);
      detail += ` · hint: ${m === 'time' ? formatDuration(ex.weight) : ex.weight + (m === 'distance' ? 'm' : 'kg')}`;
    }
    if (ex.rest) detail += ` · ${ex.rest}s rest`;
    return detail;
  }
  if (mode === 'emom') return 'per interval';
  if (mode === 'amrap') return `${ex.reps || 0} reps/round`;
  return '';
}

function setBlockMode(bi, mode) { builderBlocks[bi].mode = mode; renderBlocks(); }
function removeBlock(bi) { builderBlocks.splice(bi, 1); renderBlocks(); }

function removeExercise(bi, ei) {
  builderBlocks[bi].exercises.splice(ei, 1);
  renderBlocks();
}

function removeSupersetGroup(bi, ssId) {
  builderBlocks[bi].exercises = builderBlocks[bi].exercises.filter(e => e.ssId !== ssId);
  renderBlocks();
}

function addSupersetGroup(bi) {
  const ssId = uid();
  currentBlockIndex = bi;
  currentSupersetId = ssId;
  openExerciseModal('strength');
}

function openAddExerciseToSuperset(bi, ssId) {
  currentBlockIndex = bi;
  currentSupersetId = ssId;
  openExerciseModal('strength');
}

function openAddExercise(bi) {
  currentBlockIndex = bi;
  currentSupersetId = null;
  openExerciseModal(builderBlocks[bi].mode);
}

function openExerciseModal(mode) {
  document.getElementById('exercise-name').value = '';
  document.getElementById('exercise-sets').value = '';
  document.getElementById('exercise-reps').value = '';
  document.getElementById('exercise-weight').value = '';
  document.getElementById('exercise-rest').value = '';
  document.getElementById('exercise-amrap-reps').value = '';
  document.getElementById('exercise-fields-strength').style.display = mode === 'strength' ? '' : 'none';
  document.getElementById('exercise-fields-emom').style.display = mode === 'emom' ? '' : 'none';
  document.getElementById('exercise-fields-amrap').style.display = mode === 'amrap' ? '' : 'none';
  document.getElementById('exercise-weight-label').textContent = 'Weight hint (optional)';
  document.getElementById('exercise-weight').placeholder = 'e.g. 80';
  selectedLibraryExercise = null;
  openModal('modal-exercise');
}

function saveExercise() {
  const name = document.getElementById('exercise-name').value.trim();
  if (!name) return;
  const inLib = exerciseLibrary.some(e => e.name.toLowerCase() === name.toLowerCase());
  if (!inLib) {
    document.getElementById('exercise-name').style.outline = '2px solid var(--danger)';
    setTimeout(() => document.getElementById('exercise-name').style.outline = '', 1500);
    return;
  }
  const libEx = exerciseLibrary.find(e => e.name.toLowerCase() === name.toLowerCase());
  const mode = builderBlocks[currentBlockIndex].mode;
  const ex = { name: libEx.name };

  if (mode === 'strength') {
    ex.sets = +document.getElementById('exercise-sets').value || 3;
    ex.reps = +document.getElementById('exercise-reps').value || 10;
    ex.weight = +document.getElementById('exercise-weight').value || 0;
    ex.rest = +document.getElementById('exercise-rest').value || 60;
    if (currentSupersetId) ex.ssId = currentSupersetId;
  } else if (mode === 'emom') {
    // No reps for EMOM — just the exercise name
  } else if (mode === 'amrap') {
    ex.reps = +document.getElementById('exercise-amrap-reps').value || 10;
  }

  builderBlocks[currentBlockIndex].exercises.push(ex);
  closeModal('modal-exercise');
  renderBlocks();
}

function saveWorkout() {
  const name = document.getElementById('workout-name').value.trim();
  if (!name) return;
  if (builderBlocks.every(b => b.exercises.length === 0)) return;

  if (editingWorkoutId) {
    const idx = workouts.findIndex(w => w.id === editingWorkoutId);
    if (idx >= 0) { workouts[idx].name = name; workouts[idx].blocks = builderBlocks; }
  } else {
    workouts.push({ id: uid(), name, blocks: builderBlocks });
  }
  DB.set('workouts', workouts);
  closeModal('modal-workout');
  renderWorkouts();
}

function duplicateWorkout(id) {
  const src = workouts.find(w => w.id === id);
  if (!src) return;
  const clone = JSON.parse(JSON.stringify(src));
  clone.id = uid();
  clone.name = src.name + ' (Copy)';
  workouts.push(clone);
  DB.set('workouts', workouts);
  renderWorkouts();
}

function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  workouts = workouts.filter(w => w.id !== id);
  DB.set('workouts', workouts);
  renderWorkouts();
}

function startWorkout(id) {
  const template = workouts.find(w => w.id === id);
  if (!template) return;
  activeSession = {
    templateId: id,
    templateName: template.name,
    startedAt: new Date().toISOString(),
    blocks: JSON.parse(JSON.stringify(template.blocks)),
    currentBlock: 0,
    currentEntry: 0,
    currentSet: 0,
    setLogs: [],
    amrapRounds: 0,
    emomCurrentRound: 0,
    emomStartedAt: null,
    emomPausedAt: null,
    emomPausedElapsed: 0,
    currentExercise: 0,
    supersetRound: 0,
    supersetExIndex: 0,
    timerRunning: false,
    timerSeconds: 0,
    restSeconds: 0,
    restStartedAt: 0,
    restDuration: 0,
    isResting: false,
  };
  sessionStartTime = Date.now();
  switchTab('train');
  renderTrainView();
  startSessionTimer();
}

function startSessionTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!activeSession) return;
    updateTimers();
    renderTimerDisplay();
  }, 200);
}

function getRestRemaining() {
  if (!activeSession || !activeSession.isResting) return 0;
  const elapsed = (Date.now() - activeSession.restStartedAt) / 1000;
  return Math.max(0, activeSession.restDuration - elapsed);
}

function startRest(duration) {
  activeSession.isResting = true;
  activeSession.restStartedAt = Date.now();
  activeSession.restDuration = duration;
  activeSession.timerRunning = true;
}

function updateTimers() {
  if (!activeSession || !activeSession.timerRunning) return;
  const block = activeSession.blocks[activeSession.currentBlock];
  if (!block) return;

  if (block.mode === 'strength') {
    if (activeSession.isResting) {
      if (getRestRemaining() <= 0) {
        activeSession.isResting = false;
        activeSession.timerRunning = false;
        vibrate();
      }
    }
  } else if (block.mode === 'emom') {
    if (!activeSession.emomStartedAt) return;
    const totalRounds = block.duration || 10;
    const interval = block.interval || 60;
    const activeTime = (Date.now() - activeSession.emomStartedAt - (activeSession.emomPausedElapsed || 0)) / 1000;
    const currentRound = Math.floor(activeTime / interval);
    const prevRound = activeSession.emomCurrentRound;

    if (currentRound >= totalRounds) {
      activeSession.timerRunning = false; vibrate(); nextBlock(); return;
    }
    if (currentRound !== prevRound) {
      activeSession.emomCurrentRound = currentRound;
      activeSession.currentExercise = currentRound % block.exercises.length;
      vibrate(); renderTrainView();
    }
  } else if (block.mode === 'amrap') {
    activeSession.timerSeconds -= 0.2;
    if (activeSession.timerSeconds <= 0) {
      activeSession.timerSeconds = 0; activeSession.timerRunning = false; vibrate(); nextBlock(); return;
    }
  }
}

function renderTrainView() {
  const el = document.getElementById('train-content');
  if (!activeSession) {
    el.innerHTML = `<div class="empty-state" style="padding-top:100px"><div class="empty-icon">&#9201;</div><h3>Ready to Train</h3><p>Select a workout from the Workouts tab to begin.</p></div>`;
    return;
  }
  const block = activeSession.blocks[activeSession.currentBlock];
  if (!block) { renderWorkoutComplete(); return; }

  const elapsed = sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : '00:00';
  const blockLabel = block.label || `Block ${activeSession.currentBlock + 1}`;
  let content = `<div class="workout-active-header"><div class="workout-name">${esc(activeSession.templateName)}</div><div class="workout-elapsed">${elapsed} · ${esc(blockLabel)}/${activeSession.blocks.length}</div></div>`;

  if (block.mode === 'strength') content += renderStrengthBlock(block);
  else if (block.mode === 'emom') content += renderEmomBlock(block);
  else if (block.mode === 'amrap') content += renderAmrapBlock(block);

  content += `<div style="padding:16px;margin-top:auto"><div style="display:flex;gap:10px">
    ${activeSession.currentBlock < activeSession.blocks.length - 1 ? `<button class="btn btn-secondary" onclick="nextBlock()">Skip Block ▸</button>` : ''}
    <button class="btn btn-danger" onclick="finishWorkout()">End Workout</button></div></div>`;
  el.innerHTML = content;
}

function renderStrengthBlock(block) {
  const bi = activeSession.currentBlock;
  const entries = getEntries(block);
  const restRemaining = getRestRemaining();

  let html = '';
  entries.forEach((entry, entryIdx) => {
    const isCurrent = entryIdx === activeSession.currentEntry;
    const isPast = entryIdx < activeSession.currentEntry;

    if (entry.type === 'superset') {
      const ssExercises = entry.exercises;
      const maxSets = Math.max(...ssExercises.map(e => e.ex.sets || 3));
      const labels = ssExercises.map((_, i) => String.fromCharCode(65 + i));

      html += `<div class="train-block-section ${!isCurrent && !isPast ? 'future' : ''}" id="entry-${entryIdx}">`;
      html += `<div class="train-exercise-header" style="border-left:3px solid var(--accent);margin-left:12px">
        <span>Superset: ${ssExercises.map((e, i) => `${labels[i]} ${esc(e.ex.name)}`).join(' / ')}</span>
      </div>`;

      if (isCurrent && activeSession.isResting && restRemaining > 0) {
        html += renderRestTimer(restRemaining);
      }

      for (let r = 0; r < maxSets; r++) {
        const roundDone = ssExercises.every(item => {
          if (r >= (item.ex.sets || 3)) return true;
          const log = getSetLog(bi, item.idx, r);
          return log && (log.done || log.skipped);
        });
        const isCurrentRound = isCurrent && r === (activeSession.supersetRound || 0);

        html += `<div class="block-header" style="padding:0 16px"><span class="block-label" style="color:${roundDone ? 'var(--text-muted)' : isCurrentRound ? 'var(--accent)' : 'var(--text-secondary)'}">Round ${r + 1}</span><span class="block-line"></span></div>`;

        ssExercises.forEach((item, si) => {
          if (r >= (item.ex.sets || 3)) return;
          const log = getSetLog(bi, item.idx, r);
          const isDone = log && log.done;
          const isSkipped = log && log.skipped;
          const isActive = isCurrentRound && si === (activeSession.supersetExIndex || 0) && !isDone && !isSkipped;
          const lw = getLastWeight(item.ex.name);
          const placeholder = lw || item.ex.weight || '—';
          const itemMeasure = getExerciseMeasure(item.ex.name);
          const itemUnit = itemMeasure === 'time' ? 'sec' : itemMeasure === 'distance' ? 'm' : 'kg';

          html += `
            ${si > 0 ? '<div class="ss-connector" style="margin:2px 20px"></div>' : ''}
            <div class="set-row ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''} ${isSkipped ? 'skipped' : ''}" style="margin:0 16px 0 16px">
              <div class="set-number" style="width:40px">${labels[si]}</div>
              <div style="flex:1;font-size:13px;font-weight:600;${isDone || isSkipped ? 'text-decoration:line-through;opacity:0.5' : ''}">${esc(item.ex.name)}</div>
              <div class="set-field">
                <input class="set-input" type="number" inputmode="decimal" value="${log ? log.weight : ''}"
                  onchange="updateSetLog(${bi},${item.idx},${r},'weight',+this.value)" placeholder="${placeholder}" style="width:56px">
                <span class="set-input-label">${itemUnit}</span>
              </div>
              <div class="set-field">
                <input class="set-input" type="number" inputmode="numeric" value="${log ? log.reps : item.ex.reps || ''}"
                  onchange="updateSetLog(${bi},${item.idx},${r},'reps',+this.value)" placeholder="${item.ex.reps || '—'}" style="width:56px">
                <span class="set-input-label">${itemMeasure === 'time' ? 'rounds' : 'reps'}</span>
              </div>
              <button class="set-skip ${isSkipped ? 'done' : ''}" onclick="skipSet(${entryIdx},${r},${si},'superset')">✕</button>
              <button class="set-check ${isDone ? 'done' : ''}" onclick="completeSupersetExercise(${r},${si})">✓</button>
            </div>`;
        });
      }
      html += '</div>';
    } else {
      const ex = entry.ex;
      const ei = entry.idx;
      const totalSets = ex.sets || 3;
      const measure = getExerciseMeasure(ex.name);
      const isTime = measure === 'time';
      const isDist = measure === 'distance';
      const mUnit = isTime ? 'sec' : isDist ? 'm' : 'kg';
      const lastWeight = getLastWeight(ex.name);
      const defaultWeight = lastWeight || ex.weight || '';
      const fmtVal = v => isTime ? formatDuration(v) : v + mUnit;
      const lastLabel = lastWeight ? `Last: ${fmtVal(lastWeight)}` : (ex.weight ? `Hint: ${fmtVal(ex.weight)}` : '');

      const allDone = Array.from({ length: totalSets }, (_, i) => i).every(i => {
        const l = getSetLog(bi, ei, i); return l && (l.done || l.skipped);
      });

      html += `<div class="train-block-section ${!isCurrent && !isPast ? 'future' : ''}" id="entry-${entryIdx}">`;
      html += `<div class="train-exercise-header">
        <span onclick="showExerciseHistory('${esc(ex.name).replace(/'/g, "\\'")}')" style="cursor:pointer">${esc(ex.name)}</span>
        <span class="ex-prescription">${totalSets} × ${ex.reps} · ${ex.rest || 60}s</span>
        ${lastLabel ? `<span class="ex-last">${lastLabel}</span>` : ''}
        <button class="btn-ghost btn-sm" onclick="openSwapExercise(${bi},${ei})" style="font-size:12px;padding:4px 6px;margin-left:4px" title="Swap">⇄</button>
      </div>`;

      if (isCurrent && activeSession.isResting && restRemaining > 0) {
        html += renderRestTimer(restRemaining);
      }

      for (let s = 0; s < totalSets; s++) {
        const log = getSetLog(bi, ei, s);
        const isActive = isCurrent && s === activeSession.currentSet && !allDone;
        const isDone = log && log.done;
        const isSkipped = log && log.skipped;
        html += `
          <div class="set-row ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''} ${isSkipped ? 'skipped' : ''}" style="margin:0 16px">
            <div class="set-number">S${s + 1}</div>
            <div class="set-field">
              <input class="set-input" type="number" inputmode="decimal" value="${log ? log.weight : ''}"
                onchange="updateSetLog(${bi},${ei},${s},'weight',+this.value)" placeholder="${defaultWeight || '—'}">
              <span class="set-input-label">${mUnit}</span>
            </div>
            <div class="set-field">
              <input class="set-input" type="number" inputmode="numeric" value="${log ? log.reps : ex.reps || ''}"
                onchange="updateSetLog(${bi},${ei},${s},'reps',+this.value)" placeholder="${ex.reps || '—'}">
              <span class="set-input-label">${isTime ? 'rounds' : 'reps'}</span>
            </div>
            <button class="set-skip ${isSkipped ? 'done' : ''}" onclick="skipSet(${entryIdx},${s},-1,'standalone')">✕</button>
            <button class="set-check ${isDone ? 'done' : ''}" onclick="completeStandaloneSet(${s})">✓</button>
          </div>`;
      }
      html += '</div>';
    }
  });

  return `<div class="set-tracker">${html}</div>`;
}

function renderRestTimer(remaining) {
  return `<div class="timer-display" style="padding:12px 16px">
    <div class="timer-value" style="font-size:48px">${Math.ceil(remaining)}</div>
    <div class="timer-label">Rest</div>
    <div class="timer-edit-row">
      <button class="btn btn-secondary btn-sm" style="width:auto;padding:6px 12px" onclick="adjustRest(-15)">−15s</button>
      <button class="btn btn-secondary btn-sm" style="width:auto;padding:6px 12px" onclick="adjustRest(15)">+15s</button>
      <button class="btn btn-primary btn-sm" style="width:auto;padding:6px 12px" onclick="skipRest()">Skip</button>
    </div></div>`;
}

function skipSet(entryIdx, setIdx, subIdx, type) {
  const bi = activeSession.currentBlock;
  const block = activeSession.blocks[bi];
  const entries = getEntries(block);
  const entry = entries[entryIdx];
  if (!entry) return;

  let ei, ex;
  if (type === 'superset') {
    const item = entry.exercises[subIdx];
    ei = item.idx; ex = item.ex;
  } else {
    ei = entry.idx; ex = entry.ex;
  }

  let log = getSetLog(bi, ei, setIdx);
  if (!log) {
    log = { bi, ei, si: setIdx, weight: 0, reps: 0, done: false, skipped: false };
    activeSession.setLogs.push(log);
  }
  log.skipped = !log.skipped;
  if (log.skipped) log.done = false;

  if (log.skipped && entryIdx === activeSession.currentEntry) {
    checkAutoAdvance(entries, entryIdx, block);
  }
  renderTrainView();
}

function checkAutoAdvance(entries, entryIdx, block) {
  const bi = activeSession.currentBlock;
  const entry = entries[entryIdx];
  if (entry.type === 'superset') {
    const maxSets = Math.max(...entry.exercises.map(e => e.ex.sets || 3));
    const allComplete = Array.from({ length: maxSets }, (_, r) =>
      entry.exercises.every(item => {
        if (r >= (item.ex.sets || 3)) return true;
        const l = getSetLog(bi, item.idx, r);
        return l && (l.done || l.skipped);
      })
    ).every(Boolean);
    if (allComplete) advanceEntry();
  } else {
    const totalSets = entry.ex.sets || 3;
    const allComplete = Array.from({ length: totalSets }, (_, i) => {
      const l = getSetLog(bi, entry.idx, i); return l && (l.done || l.skipped);
    }).every(Boolean);
    if (allComplete) advanceEntry();
  }
}

function getEmomTimeLeft() {
  if (!activeSession.emomStartedAt) return 0;
  const block = activeSession.blocks[activeSession.currentBlock];
  const interval = block.interval || 60;
  const activeTime = (Date.now() - activeSession.emomStartedAt - (activeSession.emomPausedElapsed || 0)) / 1000;
  const elapsed = activeTime % interval;
  return Math.max(0, interval - elapsed);
}

function getEmomTotalRemaining() {
  if (!activeSession.emomStartedAt) return 0;
  const block = activeSession.blocks[activeSession.currentBlock];
  const totalTime = (block.duration || 10) * (block.interval || 60);
  const activeTime = (Date.now() - activeSession.emomStartedAt - (activeSession.emomPausedElapsed || 0)) / 1000;
  return Math.max(0, totalTime - activeTime);
}

function renderEmomBlock(block) {
  const totalRounds = block.duration || 10;
  const interval = block.interval || 60;
  const currentRound = activeSession.emomCurrentRound;
  const currentExIdx = block.exercises.length > 0 ? currentRound % block.exercises.length : 0;
  const intervalLeft = activeSession.emomStartedAt ? Math.ceil(getEmomTimeLeft()) : interval;
  const totalLeft = activeSession.emomStartedAt ? getEmomTotalRemaining() : totalRounds * interval;

  let dotsHtml = '';
  for (let i = 0; i < totalRounds; i++) {
    const cls = i < currentRound ? 'done' : (i === currentRound && activeSession.timerRunning ? 'active' : '');
    dotsHtml += `<div class="emom-dot ${cls}"></div>`;
  }

  let exercisesHtml = '';
  block.exercises.forEach((ex, i) => {
    const isCurrent = i === currentExIdx && activeSession.timerRunning;
    exercisesHtml += `
      <div class="emom-exercise-row ${isCurrent ? 'current' : ''}">
        <span class="emom-exercise-name">${esc(ex.name)}</span>
      </div>`;
  });

  return `
    <div class="current-exercise">
      <div class="exercise-label">EMOM · Round ${currentRound + 1}/${totalRounds}</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-top:2px">${formatTime(Math.ceil(totalLeft))} remaining</div>
    </div>
    <div class="timer-display"><div class="timer-value">${intervalLeft}</div><div class="timer-label">Interval</div></div>
    <div class="emom-exercise-list">${exercisesHtml}</div>
    <div class="emom-progress">${dotsHtml}</div>
    <div class="timer-controls">
      ${!activeSession.timerRunning ?
        `<button class="btn btn-primary" onclick="startEmom()">▶ ${activeSession.emomStartedAt ? 'Resume' : 'Start'}</button>` :
        `<button class="btn btn-secondary" onclick="pauseTimer()">❚❚ Pause</button>`}
    </div>`;
}

function renderAmrapBlock(block) {
  const totalMin = block.duration || 10;
  const timeLeft = Math.max(0, Math.ceil(activeSession.timerSeconds));
  const exerciseList = block.exercises.map(e => `${e.reps} ${e.name}`).join(' + ');
  return `
    <div class="current-exercise">
      <div class="exercise-label">AMRAP · ${totalMin} Minutes</div>
      <div class="exercise-title">${exerciseList || 'No exercises'}</div>
    </div>
    <div class="timer-display"><div class="timer-value">${formatTime(timeLeft)}</div>
      <div class="timer-label">${activeSession.timerRunning ? 'Time remaining' : 'Ready'}</div></div>
    <div class="round-counter">
      <button onclick="adjustAmrap(-1)">−</button>
      <div class="round-value">${activeSession.amrapRounds}</div>
      <button onclick="adjustAmrap(1)">+</button>
    </div>
    <div style="text-align:center;color:var(--text-secondary);font-size:13px;margin-bottom:16px">Rounds completed</div>
    <div class="timer-controls">
      ${!activeSession.timerRunning ?
        `<button class="btn btn-primary" onclick="startAmrap()">▶ ${activeSession.timerSeconds > 0 ? 'Resume' : 'Start'}</button>` :
        `<button class="btn btn-secondary" onclick="pauseTimer()">❚❚ Pause</button>`}
    </div>`;
}

function renderTimerDisplay() {
  if (!activeSession) return;
  const block = activeSession.blocks[activeSession.currentBlock];
  if (!block) return;
  const elapsed = sessionStartTime ? formatTime(Math.floor((Date.now() - sessionStartTime) / 1000)) : '00:00';
  const elapsedEl = document.querySelector('.workout-elapsed');
  const bLabel = block.label || `Block ${activeSession.currentBlock + 1}`;
  if (elapsedEl) elapsedEl.textContent = `${elapsed} · ${bLabel}/${activeSession.blocks.length}`;
  const timerEl = document.querySelector('.timer-value');
  if (!timerEl) return;
  if (block.mode === 'strength' && activeSession.isResting) {
    timerEl.textContent = Math.ceil(getRestRemaining());
  } else if (block.mode === 'emom') {
    timerEl.textContent = activeSession.emomStartedAt ? Math.ceil(getEmomTimeLeft()) : (block.interval || 60);
    const totalEl = document.querySelector('.emom-total-remaining');
    if (totalEl) totalEl.textContent = formatTime(Math.ceil(getEmomTotalRemaining()));
    const roundEl = document.querySelector('.exercise-label');
    if (roundEl) roundEl.textContent = `EMOM · Round ${activeSession.emomCurrentRound + 1}/${block.duration || 10}`;
  } else if (block.mode === 'amrap') {
    timerEl.textContent = formatTime(Math.max(0, Math.ceil(activeSession.timerSeconds)));
  }
}

function getLastWeight(exerciseName) {
  for (const h of history) {
    for (let bIdx = 0; bIdx < (h.blocks || []).length; bIdx++) {
      const block = h.blocks[bIdx];
      for (let eIdx = 0; eIdx < block.exercises.length; eIdx++) {
        if (block.exercises[eIdx].name === exerciseName) {
          const logs = (h.setLogs || []).filter(l => l.bi === bIdx && l.ei === eIdx && l.done && l.weight > 0);
          if (logs.length > 0) return logs[0].weight;
        }
      }
    }
  }
  return null;
}

function getSetLog(bi, ei, si) {
  return activeSession.setLogs.find(l => l.bi === bi && l.ei === ei && l.si === si);
}

function updateSetLog(bi, ei, si, field, value) {
  let log = getSetLog(bi, ei, si);
  if (!log) { log = { bi, ei, si, weight: 0, reps: 0, done: false }; activeSession.setLogs.push(log); }
  log[field] = value;
}

function completeStandaloneSet(si) {
  const bi = activeSession.currentBlock;
  const block = activeSession.blocks[bi];
  const entries = getEntries(block);
  const entry = entries[activeSession.currentEntry];
  if (!entry || entry.type !== 'exercise') return;
  const ei = entry.idx;
  const ex = entry.ex;

  let log = getSetLog(bi, ei, si);
  if (!log) {
    const lw = getLastWeight(ex.name);
    log = { bi, ei, si, weight: lw || ex.weight || 0, reps: ex.reps || 0, done: false };
    activeSession.setLogs.push(log);
  }
  log.done = !log.done;

  if (log.done) {
    if (log.skipped) log.skipped = false;
    const allDone = Array.from({ length: ex.sets || 3 }, (_, i) => i)
      .every(i => { const l = getSetLog(bi, ei, i); return l && (l.done || l.skipped); });
    if (allDone) { advanceEntry(); return; }
    else {
      activeSession.currentSet = si + 1;
      startRest(ex.rest || 60);
    }
  }
  renderTrainView();
}

function completeSupersetExercise(round, subIdx) {
  const bi = activeSession.currentBlock;
  const block = activeSession.blocks[bi];
  const entries = getEntries(block);
  const entry = entries[activeSession.currentEntry];
  if (!entry || entry.type !== 'superset') return;

  const item = entry.exercises[subIdx];
  const ei = item.idx;
  const ex = item.ex;

  let log = getSetLog(bi, ei, round);
  if (!log) {
    const lw = getLastWeight(ex.name);
    log = { bi, ei, si: round, weight: lw || ex.weight || 0, reps: ex.reps || 0, done: false };
    activeSession.setLogs.push(log);
  }
  log.done = !log.done;
  if (log.done && log.skipped) log.skipped = false;

  if (log.done) {
    const maxSets = Math.max(...entry.exercises.map(e => e.ex.sets || 3));
    const roundDone = entry.exercises.every(item2 => {
      if (round >= (item2.ex.sets || 3)) return true;
      const l = getSetLog(bi, item2.idx, round);
      return l && (l.done || l.skipped);
    });

    if (roundDone) {
      const nextRound = round + 1;
      if (nextRound >= maxSets) { advanceEntry(); return; }
      activeSession.supersetRound = nextRound;
      activeSession.supersetExIndex = 0;
      const lastEx = entry.exercises[entry.exercises.length - 1].ex;
      startRest(lastEx.rest || 60);
    } else {
      let next = subIdx + 1;
      while (next < entry.exercises.length && round >= (entry.exercises[next].ex.sets || 3)) next++;
      if (next < entry.exercises.length) activeSession.supersetExIndex = next;
    }
  }
  renderTrainView();
}

function advanceEntry() {
  const block = activeSession.blocks[activeSession.currentBlock];
  const entries = getEntries(block);
  if (activeSession.currentEntry < entries.length - 1) {
    activeSession.currentEntry++;
    activeSession.currentSet = 0;
    activeSession.supersetRound = 0;
    activeSession.supersetExIndex = 0;
    activeSession.isResting = false;
    activeSession.timerRunning = false;
    renderTrainView();
  } else {
    nextBlock();
  }
}

function adjustRest(delta) { activeSession.restDuration = Math.max(0, activeSession.restDuration + delta); }

function skipRest() {
  activeSession.isResting = false; activeSession.timerRunning = false;
  renderTrainView();
}

let swapBlockIdx = null, swapExIdx = null;

function openSwapExercise(bi, ei) {
  swapBlockIdx = bi;
  swapExIdx = ei;
  const ex = activeSession.blocks[bi].exercises[ei];
  document.getElementById('swap-exercise-from').textContent = `Replacing: ${ex.name}`;
  document.getElementById('swap-exercise-name').value = '';
  document.getElementById('swap-exercise-ac-list').classList.remove('visible');
  openModal('modal-swap-exercise');
}

function onSwapExerciseInput() {
  const input = document.getElementById('swap-exercise-name');
  const list = document.getElementById('swap-exercise-ac-list');
  const query = input.value.trim().toLowerCase();

  if (!query) { list.classList.remove('visible'); return; }

  const matches = exerciseLibrary
    .filter(e => e.name.toLowerCase().includes(query))
    .sort((a, b) => {
      const aStarts = a.name.toLowerCase().startsWith(query) ? 0 : 1;
      const bStarts = b.name.toLowerCase().startsWith(query) ? 0 : 1;
      return aStarts - bStarts || a.name.localeCompare(b.name);
    })
    .slice(0, 8);

  let html = matches.map(e => {
    const mLabel = e.measure === 'time' ? '⏱' : e.measure === 'distance' ? '📏' : '';
    return `<div class="autocomplete-item" onmousedown="selectSwapExercise('${esc(e.name).replace(/'/g, "\\'")}')">
      ${esc(e.name)}${e.category ? `<span class="ac-category">${esc(e.category)}</span>` : ''}${mLabel ? `<span class="ac-category">${mLabel}</span>` : ''}
    </div>`;
  }).join('');

  if (matches.length === 0) {
    html = '<div class="autocomplete-item" style="pointer-events:none;opacity:0.5">No matches</div>';
  }

  list.innerHTML = html;
  list.classList.add('visible');
}

function selectSwapExercise(name) {
  document.getElementById('swap-exercise-name').value = name;
  document.getElementById('swap-exercise-ac-list').classList.remove('visible');
}

function confirmSwapExercise() {
  const name = document.getElementById('swap-exercise-name').value.trim();
  if (!name) return;
  const inLib = exerciseLibrary.some(e => e.name.toLowerCase() === name.toLowerCase());
  if (!inLib) return;
  const libEx = exerciseLibrary.find(e => e.name.toLowerCase() === name.toLowerCase());

  const ex = activeSession.blocks[swapBlockIdx].exercises[swapExIdx];
  ex.name = libEx.name;

  activeSession.setLogs = activeSession.setLogs.filter(l => !(l.bi === swapBlockIdx && l.ei === swapExIdx));

  closeModal('modal-swap-exercise');
  renderTrainView();
}

function startEmom() {
  const block = activeSession.blocks[activeSession.currentBlock];
  if (!activeSession.emomStartedAt) {
    activeSession.emomStartedAt = Date.now();
    activeSession.emomPausedElapsed = 0;
    activeSession.emomCurrentRound = 0;
    activeSession.currentExercise = 0;
  } else if (activeSession.emomPausedAt) {
    activeSession.emomPausedElapsed += Date.now() - activeSession.emomPausedAt;
    activeSession.emomPausedAt = null;
  }
  activeSession.timerRunning = true; renderTrainView();
}

function startAmrap() {
  const block = activeSession.blocks[activeSession.currentBlock];
  if (activeSession.timerSeconds <= 0) { activeSession.timerSeconds = (block.duration || 10) * 60; activeSession.amrapRounds = 0; }
  activeSession.timerRunning = true; renderTrainView();
}

function adjustAmrap(delta) {
  activeSession.amrapRounds = Math.max(0, activeSession.amrapRounds + delta);
  const el = document.querySelector('.round-value'); if (el) el.textContent = activeSession.amrapRounds;
}

function pauseTimer() {
  const block = activeSession.blocks[activeSession.currentBlock];
  if (block && block.mode === 'emom') activeSession.emomPausedAt = Date.now();
  activeSession.timerRunning = false; renderTrainView();
}

function nextBlock() {
  activeSession.currentBlock++;
  activeSession.currentEntry = 0; activeSession.currentExercise = 0;
  activeSession.currentSet = 0; activeSession.timerRunning = false; activeSession.timerSeconds = 0;
  activeSession.isResting = false; activeSession.emomCurrentRound = 0; activeSession.amrapRounds = 0;
  activeSession.emomStartedAt = null; activeSession.emomPausedAt = null; activeSession.emomPausedElapsed = 0;
  activeSession.supersetRound = 0; activeSession.supersetExIndex = 0;
  renderTrainView();
}

function renderWorkoutComplete() {
  const duration = sessionStartTime ? Math.floor((Date.now() - sessionStartTime) / 1000) : 0;
  const totalSets = activeSession.setLogs.filter(l => l.done).length;
  const totalVolume = activeSession.setLogs.filter(l => l.done).reduce((s, l) => s + (l.weight * l.reps), 0);
  document.getElementById('train-content').innerHTML = `
    <div class="workout-summary">
      <div class="check-circle">✓</div><h2>Workout Complete</h2>
      <p style="color:var(--text-secondary)">${esc(activeSession.templateName)}</p>
      <div class="summary-stats">
        <div class="summary-stat"><div class="s-value">${formatTime(duration)}</div><div class="s-label">Duration</div></div>
        <div class="summary-stat"><div class="s-value">${totalSets}</div><div class="s-label">Sets</div></div>
        <div class="summary-stat"><div class="s-value">${totalVolume > 0 ? Math.round(totalVolume).toLocaleString() : '—'}</div><div class="s-label">Volume (kg)</div></div>
      </div>
      <button class="btn btn-primary" onclick="saveSession()">Save & Close</button>
    </div>`;
}

function finishWorkout() {
  if (!confirm('End this workout?')) return;
  activeSession.currentBlock = activeSession.blocks.length;
  renderWorkoutComplete();
}

function saveSession() {
  const duration = sessionStartTime ? Math.floor((Date.now() - sessionStartTime) / 1000) : 0;
  history.unshift({
    id: uid(), templateName: activeSession.templateName, date: activeSession.startedAt,
    duration, blocks: activeSession.blocks, setLogs: activeSession.setLogs, amrapRounds: activeSession.amrapRounds,
  });
  DB.set('history', history);
  if (timerInterval) clearInterval(timerInterval);
  activeSession = null; sessionStartTime = null;
  switchTab('history');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128202;</div><h3>No History Yet</h3><p>Complete a workout to see it here.</p></div>`;
    return;
  }
  let lastDate = '';
  el.innerHTML = history.map(h => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const showDate = dateStr !== lastDate; lastDate = dateStr;
    const totalSets = (h.setLogs || []).filter(l => l.done).length;
    const volume = (h.setLogs || []).filter(l => l.done).reduce((s, l) => s + (l.weight * l.reps), 0);
    return `
      ${showDate ? `<div class="history-date">${dateStr}</div>` : ''}
      <div class="card history-card" onclick="showHistoryDetail('${h.id}')">
        <div class="card-title">${esc(h.templateName)}</div>
        <div class="card-subtitle">${d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })} · ${formatTime(h.duration || 0)}</div>
        <div class="history-stats">
          <div class="history-stat"><div class="stat-value">${totalSets}</div><div class="stat-label">Sets</div></div>
          ${volume > 0 ? `<div class="history-stat"><div class="stat-value">${Math.round(volume).toLocaleString()}</div><div class="stat-label">Volume (kg)</div></div>` : ''}
          ${h.amrapRounds ? `<div class="history-stat"><div class="stat-value">${h.amrapRounds}</div><div class="stat-label">Rounds</div></div>` : ''}
        </div>
        ${h.notes ? `<div style="margin-top:8px;font-size:12px;color:var(--text-secondary);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(h.notes)}</div>` : ''}
      </div>`;
  }).join('');
}

function showHistoryDetail(id) {
  const h = history.find(x => x.id === id);
  if (!h) return;
  const logs = h.setLogs || [];
  let html = `<h2>${esc(h.templateName)}</h2>
    <p style="color:var(--text-secondary);margin-bottom:16px">${new Date(h.date).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} · ${formatTime(h.duration || 0)}</p>`;

  (h.blocks || []).forEach((block, bi) => {
    html += `<div class="block-header"><span class="block-label">${esc(block.label) || block.mode.toUpperCase()}</span><span class="block-line"></span></div>`;
    const entries = getEntries(block);
    entries.forEach(entry => {
      if (entry.type === 'exercise') {
        const exLogs = logs.filter(l => l.bi === bi && l.ei === entry.idx && l.done);
        html += `<div style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:4px">${esc(entry.ex.name)}</div>`;
        if (exLogs.length > 0) html += exLogs.map(l => {
          const m = getExerciseMeasure(entry.ex.name);
          const u = m === 'time' ? formatDuration(l.weight) : l.weight + (m === 'distance' ? 'm' : 'kg');
          return `<div style="font-size:13px;color:var(--text-secondary)">${u} × ${l.reps}${m === 'time' ? ' rounds' : ''}</div>`;
        }).join('');
        else if (block.mode === 'amrap' && h.amrapRounds) html += `<div style="font-size:13px;color:var(--text-secondary)">${h.amrapRounds} rounds</div>`;
        html += '</div>';
      } else {
        html += `<div style="border-left:2px solid var(--accent);padding-left:12px;margin-bottom:12px">`;
        entry.exercises.forEach((item, si) => {
          const label = String.fromCharCode(65 + si);
          const exLogs = logs.filter(l => l.bi === bi && l.ei === item.idx && l.done);
          html += `<div style="margin-bottom:8px"><div style="font-weight:700;margin-bottom:2px;color:var(--accent)">${label}: ${esc(item.ex.name)}</div>`;
          if (exLogs.length > 0) html += exLogs.map(l => {
            const m = getExerciseMeasure(item.ex.name);
            const u = m === 'time' ? formatDuration(l.weight) : l.weight + (m === 'distance' ? 'm' : 'kg');
            return `<div style="font-size:13px;color:var(--text-secondary)">${u} × ${l.reps}${m === 'time' ? ' rounds' : ''}</div>`;
          }).join('');
          html += '</div>';
        });
        html += '</div>';
      }
    });
  });

  html += `<div class="form-group" style="margin-top:20px">
    <label class="form-label">Notes</label>
    <textarea class="form-input" id="history-notes" rows="3" placeholder="How did it feel? Anything to remember next time?"
      style="resize:vertical;min-height:60px">${esc(h.notes || '')}</textarea>
  </div>
  <button class="btn btn-primary btn-sm" onclick="saveHistoryNotes('${h.id}')" style="margin-top:4px">Save Notes</button>`;

  document.getElementById('history-detail-content').innerHTML = html;
  openModal('modal-history-detail');
}

function saveHistoryNotes(id) {
  const h = history.find(x => x.id === id);
  if (!h) return;
  h.notes = document.getElementById('history-notes').value.trim();
  DB.set('history', history);
  const btn = document.querySelector('#history-detail-content .btn-primary');
  if (btn) { btn.textContent = 'Saved'; setTimeout(() => btn.textContent = 'Save Notes', 1500); }
}

function showExerciseHistory(exerciseName) {
  const measure = getExerciseMeasure(exerciseName);
  const isTime = measure === 'time';
  const isDist = measure === 'distance';
  const mUnit = isTime ? '' : isDist ? 'm' : 'kg';

  const sessions = [];
  history.forEach(h => {
    const logs = h.setLogs || [];
    (h.blocks || []).forEach((block, bi) => {
      block.exercises.forEach((ex, ei) => {
        if (ex.name !== exerciseName) return;
        const exLogs = logs.filter(l => l.bi === bi && l.ei === ei && l.done);
        if (exLogs.length > 0) {
          sessions.push({ date: h.date, workout: h.templateName, sets: exLogs });
        }
      });
    });
  });

  let html = `<h2>${esc(exerciseName)}</h2>`;
  if (measure !== 'weight') html += `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;text-transform:uppercase">${measure}</div>`;

  if (sessions.length === 0) {
    html += '<p style="color:var(--text-secondary)">No history yet for this exercise.</p>';
  } else {
    html += '<div class="exercise-history-modal-body">';
    sessions.forEach(s => {
      const d = new Date(s.date);
      const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      html += `<div class="ex-history-session">
        <div class="session-date">${dateStr} · ${esc(s.workout)}</div>
        <div class="session-sets">
          ${s.sets.map(l => {
            const val = isTime ? formatDuration(l.weight) : l.weight + mUnit;
            return `<span class="set-pill">${val} × ${l.reps}</span>`;
          }).join('')}
        </div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('exercise-history-content').innerHTML = html;
  openModal('modal-exercise-history');
}

function exportCSV() {
  let csv = 'Date,Workout,Exercise,Set,Weight (kg),Reps,Mode,Superset\n';
  history.forEach(h => {
    const date = new Date(h.date).toISOString().split('T')[0];
    (h.blocks || []).forEach((block, bi) => {
      block.exercises.forEach((ex, ei) => {
        const eLogs = (h.setLogs || []).filter(l => l.bi === bi && l.ei === ei && l.done);
        const ssLabel = ex.ssId ? 'yes' : '';
        if (eLogs.length > 0) {
          eLogs.forEach(l => { csv += `${date},${csvEsc(h.templateName)},${csvEsc(ex.name)},${l.si + 1},${l.weight},${l.reps},${block.mode},${ssLabel}\n`; });
        } else if (block.mode === 'amrap') {
          csv += `${date},${csvEsc(h.templateName)},${csvEsc(ex.name)},,,,amrap (${h.amrapRounds || 0} rounds),${ssLabel}\n`;
        } else if (block.mode === 'emom') {
          csv += `${date},${csvEsc(h.templateName)},${csvEsc(ex.name)},,,${ex.reps || ''},emom,${ssLabel}\n`;
        }
      });
    });
  });
  download('rxlog_history.csv', csv, 'text/csv');
}

function exportJSON() { download('rxlog_history.json', JSON.stringify(history, null, 2), 'application/json'); }
function exportTemplates() { download('rxlog_templates.json', JSON.stringify(workouts, null, 2), 'application/json'); }

function importTemplates(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) { imported.forEach(w => { w.id = uid(); workouts.push(w); }); DB.set('workouts', workouts); renderWorkouts(); alert(`Imported ${imported.length} workout(s)`); }
    } catch { alert('Invalid file'); }
  };
  reader.readAsText(file); event.target.value = '';
}

function uid() { return Math.random().toString(36).slice(2, 10); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function csvEsc(s) { return '"' + (s || '').replace(/"/g, '""') + '"'; }
function formatTime(sec) { const m = Math.floor(sec / 60); const s = sec % 60; return `${m.toString().padStart(2,'0')}:${Math.floor(s).toString().padStart(2,'0')}`; }
function vibrate() { if (navigator.vibrate) navigator.vibrate(200); }
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function download(filename, content, mime) { const blob = new Blob([content], { type: mime }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); }
